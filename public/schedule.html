<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="/favicon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Schedule | Cremona Music Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary":"#C9A227","primary-container":"#F5E5B0","on-primary-container":"#8B6020",
          "on-primary-fixed":"#3E2C23","primary-fixed":"#F0E8C0","primary-fixed-dim":"#D4A520",
          "secondary":"#C9A227","secondary-fixed":"#F0E8C0","on-secondary-fixed":"#3E2C23",
          "secondary-container":"#F5E5B0","on-secondary-container":"#3E2C23",
          "surface":"#FAF6EF","surface-white":"#FFFDF9","surface-container":"#edeeef",
          "surface-container-low":"#F5EFE4","surface-container-high":"#EAE0CE",
          "surface-container-highest":"#E4D8C2","on-surface":"#3E2C23","on-surface-variant":"#7A5A42",
          "border-subtle":"#E8DCC8","outline-variant":"#d4c5ab","outline":"#827660",
          "text-muted":"#8B6B52","error":"#ba1a1a","error-container":"#ffdad6","background":"#FAF6EF"
        },
        fontFamily: { sans: ["Inter","sans-serif"] }
      }
    }
  }
</script>
<style>
  body { font-family:'Inter',sans-serif; background:#FAF6EF; height:100dvh; overflow:hidden; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  .spinner { width:28px;height:28px;border:3px solid rgba(201,162,39,.15);border-top-color:#C9A227;border-radius:50%;animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity:1; }
  #toast.error  { background:#ba1a1a;color:#fff; }
  #toast.success{ background:#1e6e3b;color:#fff; }
  #toast.info   { background:#3B2A1E;color:#F5EFE4; }
  .session-block { transition:filter .12s,transform .1s; }
  .session-block:hover { filter:brightness(.94); }
  .seg-btn { transition:all .15s; }
  .seg-btn.active { background:#FFFDF9; color:#C9A227; font-weight:700; box-shadow:0 1px 2px rgba(0,0,0,.12); }
  .seg-btn:not(.active) { color:#8B6B52; }
  #cal-scroll::-webkit-scrollbar { width:6px;height:6px; }
  #cal-scroll::-webkit-scrollbar-thumb { background:#D4BCA0;border-radius:4px; }
  #cal-scroll::-webkit-scrollbar-track { background:transparent; }
</style>
<style id="cremona-palette">
header { background-color: #3B2A1E !important; border-bottom-color: rgba(255,255,255,0.08) !important; box-shadow: 0 1px 5px rgba(0,0,0,0.4) !important; }
header img[src*="logo"] { filter: invert(1) brightness(1.2); }
header nav a, header nav button span:not(.material-symbols-outlined) { color: rgba(255,248,235,0.72) !important; }
header nav a:hover { color: #C9A227 !important; }
header nav a.nav-active, header nav a[class*="text-secondary"], header nav a[class*="border-secondary"], header nav a[class*="border-b-2"] { color: #C9A227 !important; border-color: #C9A227 !important; }
footer { background-color: #3B2A1E !important; border-top-color: rgba(255,255,255,0.08) !important; }
footer p, footer span:not(.material-symbols-outlined), footer small { color: rgba(255,248,235,0.65) !important; }
footer a { color: #C9A227 !important; }
footer img[src*="logo"] { filter: invert(1) brightness(1.2); }
</style>
</head>
<body class="text-on-surface">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">
    <div class="spinner"></div>
    <p class="text-text-muted text-sm">Loading schedule...</p>
  </div>
</div>

<div id="toast"></div>

<!-- ── Session Detail Modal ─────────────────────────────────────────────────── -->
<div id="session-modal" class="hidden fixed inset-0 bg-black/40 z-[100] flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
  <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
    <div class="flex items-start justify-between mb-4">
      <h2 class="font-bold text-lg text-on-surface">Session Details</h2>
      <button onclick="closeModal()" class="text-text-muted hover:text-on-surface p-1 rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <span id="modal-status-badge" class="inline-block px-3 py-1 rounded-full text-xs font-bold border mb-4">Scheduled</span>
    <dl class="space-y-3">
      <div><dt class="text-xs font-semibold text-text-muted uppercase tracking-wide">Student</dt><dd id="modal-student" class="font-semibold text-on-surface mt-0.5">—</dd></div>
      <div><dt class="text-xs font-semibold text-text-muted uppercase tracking-wide">Instrument</dt><dd id="modal-subject" class="text-on-surface mt-0.5">—</dd></div>
      <div><dt class="text-xs font-semibold text-text-muted uppercase tracking-wide">Date & Time</dt><dd id="modal-datetime" class="text-on-surface mt-0.5">—</dd></div>
      <div><dt class="text-xs font-semibold text-text-muted uppercase tracking-wide">Duration</dt><dd id="modal-duration" class="text-on-surface mt-0.5">—</dd></div>
      <div><dt class="text-xs font-semibold text-text-muted uppercase tracking-wide">Teacher</dt><dd id="modal-teacher" class="text-on-surface mt-0.5">—</dd></div>
    </dl>
    <a id="modal-meet" href="#" target="_blank" rel="noopener"
       class="hidden mt-5 w-full flex items-center justify-center gap-2 bg-secondary text-white rounded-xl py-3 font-bold text-sm hover:brightness-110 transition-all">
      <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">video_call</span>
      Join Google Meet
    </a>
    <button onclick="closeModal()" class="mt-3 w-full border border-border-subtle rounded-xl py-2.5 text-sm text-text-muted hover:bg-surface-container transition-colors">Close</button>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<main class="max-w-[1200px] mx-auto w-full px-3 sm:px-6 py-4 flex flex-col gap-4" style="height:calc(100dvh - 56px)">

  <!-- Toolbar -->
  <div class="flex items-center justify-between gap-3 flex-shrink-0 flex-wrap">
    <div class="flex items-center gap-2">
      <div class="flex gap-0.5 bg-surface-container rounded-xl p-1">
        <button id="seg-week" onclick="setView('week')" class="seg-btn active px-3 py-1.5 rounded-lg text-sm flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px]">calendar_view_week</span><span class="hidden sm:inline">Week</span>
        </button>
        <button id="seg-day" onclick="setView('day')" class="seg-btn px-3 py-1.5 rounded-lg text-sm flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px]">calendar_view_day</span><span class="hidden sm:inline">Day</span>
        </button>
      </div>
    </div>

    <div class="flex items-center gap-1.5 order-3 sm:order-2 w-full sm:w-auto justify-center">
      <button onclick="navPrev()" class="w-9 h-9 flex items-center justify-center bg-surface-white border border-border-subtle rounded-lg text-on-surface hover:bg-surface-container transition-colors shadow-sm">
        <span class="material-symbols-outlined text-[18px]">chevron_left</span>
      </button>
      <button onclick="goToToday()" class="px-3 h-9 bg-surface-white border border-border-subtle rounded-lg text-sm font-semibold text-secondary hover:bg-secondary/5 transition-colors shadow-sm">Today</button>
      <button onclick="navNext()" class="w-9 h-9 flex items-center justify-center bg-surface-white border border-border-subtle rounded-lg text-on-surface hover:bg-surface-container transition-colors shadow-sm">
        <span class="material-symbols-outlined text-[18px]">chevron_right</span>
      </button>
    </div>

    <h2 id="range-label" class="font-bold text-sm sm:text-base text-on-surface order-2 sm:order-3 flex-1 sm:flex-none text-right sm:text-left min-w-0 truncate">—</h2>
  </div>

  <!-- Calendar -->
  <div class="bg-surface-white rounded-xl border border-border-subtle shadow-sm overflow-hidden flex-1 min-h-0 flex flex-col">
    <div id="cal-scroll" class="overflow-auto flex-1 min-h-0">
      <div id="calendar" class="h-full">
        <div class="flex items-center justify-center py-16 text-text-muted text-sm gap-3"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-range" class="hidden text-center py-6 text-text-muted flex-shrink-0">
    <span class="material-symbols-outlined text-3xl block mb-1 opacity-30">calendar_today</span>
    <p class="text-sm font-semibold">No sessions in this period</p>
  </div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyB_TQF-oExYsPY4qOJtfrcDCwXbc4HV0-0",
  authDomain:"cremonamusic-portal.firebaseapp.com",projectId:"cremonamusic-portal",
  storageBucket:"cremonamusic-portal.firebasestorage.app",
  messagingSenderId:"227259733472",appId:"1:227259733472:web:3cb86ab0da1d5338858785"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Calendar constants — 8am to 10pm only ──────────────────────────────────────
const CAL_START   = 8;    // 08:00
const CAL_END     = 22;   // 22:00
const PX_PER_HOUR = 46;
const CAL_HEIGHT  = (CAL_END - CAL_START) * PX_PER_HOUR;
const TIME_W      = 46;
const DAY_NAMES   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS      = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const STATUS = {
  scheduled: { bg:'#eff6ff', border:'#3b82f6', text:'#1d4ed8', label:'Scheduled' },
  completed: { bg:'#f0fdf4', border:'#22c55e', text:'#15803d', label:'Completed' },
  cancelled: { bg:'#f9fafb', border:'#9ca3af', text:'#6b7280', label:'Cancelled' },
};
function getDisplayStatus(s) {
  if (s.status === 'cancelled') return 'cancelled';
  return toDate(s.dateTime) < new Date() ? 'completed' : 'scheduled';
}

// ── State ──────────────────────────────────────────────────────────────────────
let viewMode = window.matchMedia('(max-width:640px)').matches ? 'day' : 'week';
let weekStart = getMonday(new Date());
let currentDay = new Date(); currentDay.setHours(0,0,0,0);
let allSessions = [];
let currentUser = null;

// ── Auth ───────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/index.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().status === 'inactive') {
    await signOut(auth); window.location.href = '/index.html'; return;
  }
  const role = snap.data().role;
  if (role !== 'teacher' && role !== 'admin') { window.location.href = '/index.html'; return; }
  currentUser = { uid: user.uid, name: snap.data().name || user.email };
  await loadSessions(user.uid);
  setView(viewMode);
  document.getElementById('loading-overlay').style.display = 'none';
});

async function loadSessions(uid) {
  try {
    const snap = await getDocs(query(collection(db, 'sessions'), where('teacherUid', '==', uid)));
    allSessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) { console.error('loadSessions:', e); showToast('Failed to load sessions.', 'error'); }
}

// ── View switching ───────────────────────────────────────────────────────────
window.setView = function(v) {
  viewMode = v;
  document.getElementById('seg-week').classList.toggle('active', v === 'week');
  document.getElementById('seg-day').classList.toggle('active', v === 'day');
  render();
};
window.navPrev  = function() { if (viewMode === 'week') weekStart = offsetDays(weekStart, -7); else currentDay = offsetDays(currentDay, -1); render(); };
window.navNext  = function() { if (viewMode === 'week') weekStart = offsetDays(weekStart,  7); else currentDay = offsetDays(currentDay,  1); render(); };
window.goToToday = function() { weekStart = getMonday(new Date()); currentDay = new Date(); currentDay.setHours(0,0,0,0); render(); };

function render() { viewMode === 'week' ? renderWeek() : renderDay(); }

// ── Shared column builder ──────────────────────────────────────────────────────
function hourLinesHtml() {
  let h = '';
  for (let hr = CAL_START; hr <= CAL_END; hr++) {
    const top = (hr - CAL_START) * PX_PER_HOUR;
    h += `<div style="position:absolute;left:0;right:0;top:${top}px;height:1px;background:#f1eee7;"></div>`;
  }
  return h;
}
function timeColumnHtml() {
  let h = `<div style="position:relative;border-right:1px solid #eee7da;background:#faf7f0;">`;
  for (let hr = CAL_START; hr <= CAL_END; hr++) {
    const top = (hr - CAL_START) * PX_PER_HOUR;
    const lbl = hr === 12 ? '12p' : hr < 12 ? hr + 'a' : (hr - 12) + 'p';
    h += `<div style="position:absolute;top:${top - 6}px;right:5px;font-size:9px;color:#a89a86;font-weight:600;line-height:1;">${lbl}</div>`;
  }
  return h + `</div>`;
}
function sessionBlocksHtml(sessions, detailed) {
  return sessions.map(s => {
    const disp = getDisplayStatus(s);
    const cfg  = STATUS[disp] || STATUS.scheduled;
    const top  = sessionTop(s), height = sessionH(s);
    const time = fmtTime(toDate(s.dateTime));
    const name = detailed ? (s.studentName || '—') : (s.studentName || '—').split(' ')[0];
    const cancelled = disp === 'cancelled';
    return `
      <div class="session-block" data-sid="${s.id}" style="
            position:absolute;left:3px;right:3px;top:${top}px;height:${height}px;min-height:20px;
            background:${cfg.bg};border-left:3px solid ${cfg.border};border-radius:5px;
            padding:2px 6px;cursor:pointer;overflow:hidden;z-index:2;${cancelled ? 'opacity:.55;' : ''}">
        <div style="font-size:11px;font-weight:700;color:${cfg.text};line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${cancelled ? 'text-decoration:line-through;' : ''}">${escHtml(name)}</div>
        ${height >= 32 ? `<div style="font-size:10px;color:${cfg.text};opacity:.85;line-height:1.2;">${time}${detailed && s.duration ? ' · ' + s.duration + 'm' : ''}</div>` : ''}
        ${height >= 44 && s.subject ? `<div style="font-size:10px;color:${cfg.text};opacity:.7;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(s.subject)}</div>` : ''}
      </div>`;
  }).join('');
}

// ── Week view ──────────────────────────────────────────────────────────────────
function renderWeek() {
  const days = getWeekDays(weekStart);
  const today = new Date();
  document.getElementById('range-label').textContent = fmtWeekLabel(days);

  const weekSessions = days.flatMap(d => sessionsForDay(d));
  document.getElementById('empty-range').classList.toggle('hidden', weekSessions.length > 0);

  const cols = `${TIME_W}px repeat(7,minmax(88px,1fr))`;
  // Header (sticky)
  let html = `<div style="display:grid;grid-template-columns:${cols};position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #eee7da;">
    <div style="background:#faf7f0;"></div>`;
  days.forEach((day, i) => {
    const isToday = day.toDateString() === today.toDateString();
    html += `<div style="height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-left:1px solid #f4f0e8;background:${isToday ? '#fbf7ea' : '#fff'};">
      <span style="font-size:10px;font-weight:600;color:${isToday ? '#C9A227' : '#8B6B52'};text-transform:uppercase;">${DAY_NAMES[i]}</span>
      <span style="width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;font-weight:700;background:${isToday ? '#C9A227' : 'transparent'};color:${isToday ? '#fff' : '#3E2C23'};">${day.getDate()}</span>
    </div>`;
  });
  html += `</div>`;

  // Body
  html += `<div style="display:grid;grid-template-columns:${cols};height:${CAL_HEIGHT}px;">`;
  html += timeColumnHtml();
  days.forEach(day => {
    const isToday = day.toDateString() === today.toDateString();
    html += `<div style="position:relative;border-left:1px solid #f4f0e8;background:${isToday ? 'rgba(201,162,39,0.04)' : 'transparent'};">
      ${hourLinesHtml()}${sessionBlocksHtml(sessionsForDay(day), false)}</div>`;
  });
  html += `</div>`;

  paint(html);
}

// ── Day view ───────────────────────────────────────────────────────────────────
function renderDay() {
  const today = new Date();
  const isToday = currentDay.toDateString() === today.toDateString();
  document.getElementById('range-label').textContent =
    (isToday ? 'Today · ' : '') + currentDay.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

  const sessions = sessionsForDay(currentDay);
  document.getElementById('empty-range').classList.toggle('hidden', sessions.length > 0);

  const cols = `${TIME_W}px 1fr`;
  let html = `<div style="display:grid;grid-template-columns:${cols};position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #eee7da;">
    <div style="background:#faf7f0;"></div>
    <div style="height:46px;display:flex;align-items:center;justify-content:center;gap:2px;background:${isToday ? '#fbf7ea' : '#fff'};">
      <span style="font-size:13px;font-weight:700;color:${isToday ? '#C9A227' : '#3E2C23'};">${sessions.length} session${sessions.length !== 1 ? 's' : ''}</span>
    </div>
  </div>`;
  html += `<div style="display:grid;grid-template-columns:${cols};height:${CAL_HEIGHT}px;">`;
  html += timeColumnHtml();
  html += `<div style="position:relative;background:${isToday ? 'rgba(201,162,39,0.04)' : 'transparent'};">
    ${hourLinesHtml()}${sessionBlocksHtml(sessions, true)}</div>`;
  html += `</div>`;

  paint(html);
}

function paint(html) {
  const cal = document.getElementById('calendar');
  cal.innerHTML = html;
  cal.querySelectorAll('.session-block').forEach(b => b.addEventListener('click', () => openModal(b.dataset.sid)));
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function openModal(sid) {
  const s = allSessions.find(x => x.id === sid);
  if (!s) return;
  const cfg = STATUS[getDisplayStatus(s)] || STATUS.scheduled;
  const dt  = toDate(s.dateTime);
  document.getElementById('modal-student').textContent  = s.studentName || '—';
  document.getElementById('modal-subject').textContent  = s.subject || '—';
  document.getElementById('modal-duration').textContent = `${s.duration || '—'} minutes`;
  document.getElementById('modal-teacher').textContent  = s.teacherName || currentUser?.name || '—';
  document.getElementById('modal-datetime').textContent =
    dt.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) + ' at ' + fmtTime(dt);
  const badge = document.getElementById('modal-status-badge');
  badge.textContent = cfg.label;
  badge.style.cssText = `background:${cfg.bg};color:${cfg.text};border-color:${cfg.border};display:inline-block;padding:2px 12px;border-radius:9999px;font-size:12px;font-weight:700;border-width:1px;border-style:solid;margin-bottom:16px;`;
  const meetBtn = document.getElementById('modal-meet');
  if (s.meetLink && s.status !== 'cancelled') {
    meetBtn.classList.remove('hidden');
    meetBtn.href = s.meetLink.startsWith('http') ? s.meetLink : 'https://' + s.meetLink;
  } else { meetBtn.classList.add('hidden'); }
  document.getElementById('session-modal').classList.remove('hidden');
}
window.closeModal = function() { document.getElementById('session-modal').classList.add('hidden'); };

// ── Helpers ────────────────────────────────────────────────────────────────────
function getMonday(d) { const day = d.getDay(), diff = day === 0 ? -6 : 1 - day; const m = new Date(d); m.setDate(m.getDate() + diff); m.setHours(0,0,0,0); return m; }
function getWeekDays(mon) { return Array.from({ length: 7 }, (_, i) => { const d = new Date(mon); d.setDate(d.getDate() + i); return d; }); }
function offsetDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtWeekLabel(days) {
  const s = days[0], e = days[6];
  return s.getMonth() === e.getMonth()
    ? `${MONTHS[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`
    : `${MONTHS[s.getMonth()]} ${s.getDate()} – ${MONTHS[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;
}
function fmtTime(d) { return d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }); }
function toDate(v) { if (!v) return new Date(0); if (typeof v.toDate === 'function') return v.toDate(); return new Date(v); }
function sessionsForDay(day) {
  return allSessions.filter(s => toDate(s.dateTime).toDateString() === day.toDateString())
    .sort((a, b) => toDate(a.dateTime) - toDate(b.dateTime));
}
function sessionTop(s) {
  const dt = toDate(s.dateTime);
  return Math.max(0, ((dt.getHours() + dt.getMinutes() / 60) - CAL_START) * PX_PER_HOUR);
}
function sessionH(s) { return Math.max(20, ((s.duration || 30) / 60) * PX_PER_HOUR); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg, type = 'info') { const t = document.getElementById('toast'); t.textContent = msg; t.className = `show ${type}`; setTimeout(() => t.className = '', 3000); }
</script>
  <script>window.CREMONA_NAV={portal:'teacher',active:'schedule',title:'Schedule'};</script>
  <script src="/js/portal-nav.js"></script>
</body>
</html>
