<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Slip | Cremona Music</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, 'Times New Roman', serif;
    background: #eceef0;
    color: #1A1410;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .toolbar {
    max-width: 210mm; margin: 0 auto; padding: 16px 8px;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .toolbar button {
    border: none; background: #C8A951; color: #2A1D14; font-weight: 800;
    font-size: 14px; padding: 10px 22px; border-radius: 10px; cursor: pointer;
    font-family: inherit; box-shadow: 0 6px 16px -6px rgba(59,42,30,.5);
  }
  .toolbar p { font-size: 12px; color: #7A6A57; }
  .sheet {
    width: 210mm; min-height: 297mm; margin: 0 auto 40px;
    background: #fff; padding: 22mm 20mm;
    box-shadow: 0 10px 40px -12px rgba(0,0,0,.25);
  }
  .frame { border: 2px solid #1A1410; min-height: 253mm; padding: 14mm 12mm; position: relative; }
  h1 { text-align: center; font-size: 26px; letter-spacing: 4px; font-weight: 800; }
  .h-sub { text-align: center; font-size: 13px; color: #444; margin-top: 4px; letter-spacing: 6px; }
  .h-rule { width: 62%; margin: 12px auto 0; border-bottom: 2px solid #1A1410; }
  .docno { margin-top: 26px; font-size: 13px; display: flex; justify-content: space-between; }
  .docno b { border-bottom: 1px solid #1A1410; padding: 0 8px 2px; font-weight: 600; }
  table.data { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13.5px; }
  table.data th, table.data td { border: 1px solid #1A1410; padding: 9px 12px; text-align: left; }
  table.data th.lbl { width: 190px; background: #f2f2f2; font-weight: 600; }
  .pay { margin-top: 24px; }
  .pay table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .pay th { border: 1px solid #1A1410; background: #e9e9e9; padding: 9px 12px; text-align: left; }
  .pay td { border: 1px solid #1A1410; padding: 9px 12px; }
  .pay .amt { text-align: right; font-variant-numeric: tabular-nums; }
  .pay .total td { font-weight: 800; background: #f7f3e7; font-size: 15px; }
  .certify { text-align: center; font-size: 14.5px; font-weight: 700; margin-top: 46px; }
  .certify-ko { text-align: center; font-size: 12px; color: #555; margin-top: 6px; }
  .dateline { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 60px; font-size: 13px; }
  .seal { text-align: right; color: #333; line-height: 1.5; }
  .company { position: absolute; left: 12mm; right: 12mm; bottom: 12mm; font-size: 12.5px; }
  .company .row { display: flex; gap: 8px; padding: 6px 0; border-top: 1px solid #1A1410; }
  .company .row:first-child { border-top: 1.5px solid #1A1410; }
  .company .k { width: 150px; font-weight: 700; flex-shrink: 0; }
  .err { max-width: 480px; margin: 15vh auto; background: #fff; border-radius: 16px; padding: 40px; text-align: center; font-size: 14px; color: #444; }
  @media print {
    body { background: #fff; }
    .toolbar { display: none; }
    .sheet { box-shadow: none; margin: 0; width: auto; }
  }
  @page { size: A4; margin: 0; }
</style>
</head>
<body>

<div class="toolbar">
  <p>Payment Slip · 급여명세서 — use the Print button and choose "Save as PDF" if you need a file.</p>
  <button onclick="window.print()">🖨 Print / Save PDF</button>
</div>

<div id="content"><div class="err">Loading payment slip…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "REPLACE_ME_CREMONA_API_KEY",
  authDomain: "portal.cremonamusic.com", projectId: "cremona-portal",
  storageBucket: "cremona-portal.firebasestorage.app",
  messagingSenderId: "REPLACE_ME_SENDER_ID", appId: "REPLACE_ME_APP_ID"
});
const auth = getAuth(app);
const db = getFirestore(app);

const COMPANY = {
  nameEn: 'CREMONA CO. LTD',
  rep: '정찬미 (JUNG CHANMI)',
  bizNo: '130-47-60022',
  tel: '010-9052-5935',
  email: 'op@cremonamusic.com',
  addrKo: '서울특별시 서초구 서초대로77길 9 누드죤빌딩 9층 902호',
  addrEn: '9F #902, Nudejon Bldg., 9 Seocho-daero 77-gil, Seocho-gu, Seoul, Korea',
};
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function esc(x) { return String(x ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fail(msg) { document.getElementById('content').innerHTML = `<div class="err">${esc(msg)}</div>`; }
function fmtDate(d) { return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
function fmtAmount(amount, currency) {
  try { return new Intl.NumberFormat('en-US', { style: 'currency', currency: currency || 'KRW', maximumFractionDigits: currency === 'KRW' || !currency ? 0 : 2 }).format(amount || 0); }
  catch { return (amount || 0).toLocaleString() + ' ' + (currency || ''); }
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = '/'; return; }
  const id = new URLSearchParams(location.search).get('id');
  if (!id) return fail('No payment slip specified.');
  try {
    const salSnap = await getDoc(doc(db, 'salaries', id));
    if (!salSnap.exists()) return fail('This salary record was not found.');
    const sal = salSnap.data();

    const tSnap = await getDoc(doc(db, 'users', sal.teacherUid));
    const t = tSnap.exists() ? tSnap.data() : {};

    const period = `${MONTHS[(sal.periodMonth || 1) - 1]} ${sal.periodYear || ''}`;
    const paid = sal.status === 'paid';
    const payDate = sal.paymentDate?.toDate ? fmtDate(sal.paymentDate.toDate())
      : (typeof sal.paymentDate === 'string' && sal.paymentDate ? sal.paymentDate : '—');
    const issued = new Date();
    const period4 = `${sal.periodYear || ''}${String(sal.periodMonth || 0).padStart(2, '0')}`;

    document.title = `Payment Slip ${period} — ${t.name || ''}`;
    document.getElementById('content').innerHTML = `
    <div class="sheet"><div class="frame">
      <h1>PAYMENT SLIP</h1>
      <p class="h-sub">급 여 명 세 서</p>
      <div class="h-rule"></div>

      <p class="docno">
        <span>Document No. <b>PS-${esc(period4)}-${esc(id.slice(0, 4).toUpperCase())}</b></span>
        <span>Pay Period: <b>${esc(period)}</b></span>
      </p>

      <table class="data">
        <tr><th class="lbl">Employee Name</th><td>${esc(t.name || '—')}</td></tr>
        <tr><th class="lbl">Department</th><td>Education</td></tr>
        <tr><th class="lbl">Position</th><td>Teacher</td></tr>
        <tr><th class="lbl">Payment Status</th><td>${paid ? 'Paid' : esc((sal.status || 'Pending').charAt(0).toUpperCase() + (sal.status || 'Pending').slice(1))}</td></tr>
        <tr><th class="lbl">Payment Date</th><td>${esc(payDate)}</td></tr>
      </table>

      <div class="pay">
        <table>
          <tr><th style="width:70%">Description</th><th class="amt">Amount</th></tr>
          <tr><td>Monthly salary — ${esc(period)}${sal.isRecurring === false ? ' (one-time payment)' : ''}</td><td class="amt">${esc(fmtAmount(sal.amount, sal.currency))}</td></tr>
          ${sal.note ? `<tr><td colspan="2" style="font-size:12px;color:#555;">Note: ${esc(sal.note)}</td></tr>` : ''}
          <tr class="total"><td>TOTAL</td><td class="amt">${esc(fmtAmount(sal.amount, sal.currency))}</td></tr>
        </table>
      </div>

      <p class="certify">This is to certify that the above payment details are true and correct.</p>
      <p class="certify-ko">위와 같이 급여를 지급(예정)하였음을 증명합니다.</p>

      <div class="dateline">
        <span>Issued: ${esc(fmtDate(issued))}</span>
        <span class="seal">/S/ Official<br/>Seal Affixed</span>
      </div>

      <div class="company">
        <div class="row"><span class="k">Company Name</span><span>${esc(COMPANY.nameEn)}</span></div>
        <div class="row"><span class="k">Rep. Director</span><span>${esc(COMPANY.rep)}</span></div>
        <div class="row"><span class="k">Business Reg. No.</span><span>${esc(COMPANY.bizNo)}</span></div>
        <div class="row"><span class="k">Address</span><span>${esc(COMPANY.addrKo)}<br/>${esc(COMPANY.addrEn)}</span></div>
        <div class="row"><span class="k">Contact</span><span>Tel ${esc(COMPANY.tel)} · Email ${esc(COMPANY.email)}</span></div>
      </div>
    </div></div>`;
  } catch (e) {
    console.error(e);
    fail(e.code === 'permission-denied'
      ? 'You do not have permission to view this payment slip.'
      : 'Failed to load the payment slip: ' + e.message);
  }
});
</script>
</body>
</html>
