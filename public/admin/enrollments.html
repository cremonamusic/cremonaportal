<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="/favicon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Enrollments | Cremona Music Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme: { extend: {
      colors: {
        "surface-variant":"#E4D8C2","error-container":"#ffdad6","text-muted":"#8B6B52",
        "surface-white":"#FFFDF9","surface-container-low":"#F5EFE4","primary-container":"#F5E5B0",
        "secondary-container":"#F5E5B0","secondary":"#C9A227","on-surface-variant":"#7A5A42",
        "on-surface":"#3E2C23","secondary-fixed":"#F0E8C0","surface-container-highest":"#E4D8C2",
        "border-subtle":"#E8DCC8","background":"#FAF6EF","primary-fixed":"#F0E8C0","primary":"#C9A227",
        "on-primary-container":"#8B6020","outline":"#827660","outline-variant":"#d4c5ab",
        "surface-container":"#edeeef","error":"#ba1a1a","surface-container-high":"#EAE0CE",
        "on-primary":"#3E2C23","on-background":"#3E2C23","surface":"#FAF6EF","on-primary-fixed":"#3E2C23"
      },
      spacing:{"gutter":"24px","container-max":"1200px","margin-desktop":"40px"},
      fontFamily:{"body-sm":["Inter"],"headline-lg":["Inter"],"body-md":["Inter"],"label-sm":["Inter"],"headline-sm":["Inter"],"label-md":["Inter"],"headline-md":["Inter"]},
      fontSize:{
        "body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],
        "headline-lg":["32px",{"lineHeight":"40px","letterSpacing":"-0.02em","fontWeight":"700"}],
        "body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],
        "label-sm":["12px",{"lineHeight":"16px","fontWeight":"500"}],
        "headline-sm":["20px",{"lineHeight":"28px","fontWeight":"600"}],
        "label-md":["14px",{"lineHeight":"16px","letterSpacing":"0.01em","fontWeight":"500"}],
        "headline-md":["24px",{"lineHeight":"32px","fontWeight":"600"}]
      }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  body { font-family:'Inter',sans-serif; }
  .spinner { width:20px;height:20px;border:2px solid rgba(201,162,39,.2);border-top-color:#C9A227;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity:1; }
  #toast.error   { background:#ba1a1a;color:#fff; }
  #toast.success { background:#1e6e3b;color:#fff; }
  #toast.info    { background:#3B2A1E;color:#F5EFE4; }
  tr.enroll-row:hover td { background:#FAF6EF; }
  tr.enroll-row { cursor:pointer; }
</style>
<style id="cremona-palette">
header { background-color: #3B2A1E !important; border-bottom-color: rgba(255,255,255,0.08) !important; box-shadow: 0 1px 5px rgba(0,0,0,0.4) !important; }
header img[src*="logo"] { filter: invert(1) brightness(1.2); }
footer { background-color: #3B2A1E !important; border-top-color: rgba(255,255,255,0.08) !important; }
</style>
</head>
<body class="bg-background text-on-surface selection:bg-secondary-fixed">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">
    <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
    <p class="text-text-muted text-sm">Loading...</p>
  </div>
</div>
<div id="toast"></div>

<!-- ── Submission Detail Modal ─────────────────────────────────────────────── -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/40 z-[100] flex items-start justify-center p-4 pt-12 overflow-y-auto" onclick="if(event.target===this)closeDetail()">
  <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl mb-8">
    <div class="flex items-center justify-between px-6 py-5 border-b border-border-subtle">
      <div class="flex items-center gap-3 min-w-0">
        <h2 id="detail-name" class="font-headline-sm truncate">Submission</h2>
        <span id="detail-type-badge" class="px-2 py-0.5 rounded-full text-[11px] font-bold flex-shrink-0"></span>
        <span id="detail-status-badge" class="px-2 py-0.5 rounded-full text-[11px] font-bold flex-shrink-0"></span>
      </div>
      <button onclick="closeDetail()" class="text-text-muted hover:text-on-surface p-1 rounded-lg hover:bg-surface-container transition-colors flex-shrink-0">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div id="detail-body" class="px-6 py-5"></div>
    <div class="flex items-center justify-end gap-3 px-6 pb-5 border-t border-border-subtle pt-4">
      <button id="detail-approve-btn" onclick="approveCurrent()" class="hidden px-4 py-2.5 text-sm font-bold bg-primary-container text-on-primary-fixed rounded-lg hover:brightness-105 transition-all active:scale-95 shadow-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px]">check_circle</span> Approve
      </button>
      <button onclick="closeDetail()" class="px-4 py-2.5 text-sm font-medium text-text-muted border border-border-subtle rounded-lg hover:bg-surface-container transition-colors">Close</button>
    </div>
  </div>
</div>

<main class="max-w-container-max mx-auto px-margin-desktop py-gutter">
  <!-- Page header -->
  <div class="mb-6">
    <h1 class="font-headline-lg text-on-surface mb-1">Enrollment Submissions</h1>
    <p class="font-body-md text-text-muted">Forms submitted through the public enrollment &amp; trial pages.</p>
  </div>

  <!-- Filters -->
  <div class="bg-surface-white border border-border-subtle rounded-xl p-4 shadow-[0px_2px_4px_rgba(0,0,0,0.05)] mb-5 flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[160px]">
      <label class="block text-label-sm text-text-muted mb-1">Search</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted" style="font-size:16px">search</span>
        <input id="search-input" type="text" placeholder="Student or parent name…" oninput="applyFilters()"
               class="w-full pl-9 pr-3 py-2 border border-border-subtle rounded-lg text-sm focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none"/>
      </div>
    </div>
    <div class="min-w-[130px]">
      <label class="block text-label-sm text-text-muted mb-1">Form type</label>
      <select id="type-filter" onchange="applyFilters()"
              class="w-full border border-border-subtle rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none bg-white">
        <option value="">All forms</option>
        <option value="enrollment">Enrollment</option>
        <option value="trial">Trial</option>
      </select>
    </div>
    <div class="min-w-[130px]">
      <label class="block text-label-sm text-text-muted mb-1">Status</label>
      <select id="status-filter" onchange="applyFilters()"
              class="w-full border border-border-subtle rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none bg-white">
        <option value="pending">Pending review</option>
        <option value="active">Approved</option>
        <option value="">All</option>
      </select>
    </div>
    <button onclick="clearFilters()" class="text-sm text-text-muted hover:text-error transition-colors px-2">Clear</button>
    <span id="result-count" class="text-label-sm text-text-muted ml-auto self-center"></span>
  </div>

  <!-- Table -->
  <div class="bg-surface-white border border-border-subtle rounded-xl shadow-[0px_2px_4px_rgba(0,0,0,0.05)] overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-border-subtle">
          <th class="text-left px-6 py-3.5 font-label-md text-text-muted">Student</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted hidden sm:table-cell">Form</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted hidden md:table-cell">Submitted</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted">Status</th>
          <th class="text-right px-6 py-3.5 font-label-md text-text-muted">Actions</th>
        </tr>
      </thead>
      <tbody id="enroll-tbody">
        <tr><td colspan="5" class="text-center py-12 text-text-muted">
          <div class="flex items-center justify-center gap-3"><div class="spinner"></div> Loading submissions…</div>
        </td></tr>
      </tbody>
    </table>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyB_TQF-oExYsPY4qOJtfrcDCwXbc4HV0-0",
  authDomain:"cremonamusic-portal.firebaseapp.com",projectId:"cremonamusic-portal",
  storageBucket:"cremonamusic-portal.firebasestorage.app",
  messagingSenderId:"227259733472",appId:"1:227259733472:web:3cb86ab0da1d5338858785"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──────────────────────────────────────────────────────────────────────
let allSubs      = [];   // all form submissions
let currentSub   = null; // submission open in the detail modal

// ── Auth ───────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/index.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().role !== 'admin') { window.location.href = '/index.html'; return; }
  await loadSubmissions();
  document.getElementById('loading-overlay').style.display = 'none';

  // Deep-link: ?studentId=xxx opens that submission directly
  const target = new URLSearchParams(location.search).get('studentId');
  if (target) {
    const sub = allSubs.find(s => s.id === target);
    if (sub) openDetail(sub.id);
    else showToast('That student has no enrollment submission on file.', 'info');
  }
});

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadSubmissions() {
  try {
    const snap = await getDocs(query(collection(db, 'students'),
      where('registeredViaEnrollmentForm', '==', true)));
    allSubs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => toDate(b.createdAt) - toDate(a.createdAt));   // newest first
  } catch (e) {
    console.error('[enrollments] load failed', e);
    showToast('Failed to load submissions.', 'error');
    allSubs = [];
  }
  applyFilters();
}

// ── Filter + render table ─────────────────────────────────────────────────────
window.applyFilters = function() {
  const q  = document.getElementById('search-input').value.trim().toLowerCase();
  const ty = document.getElementById('type-filter').value;
  const st = document.getElementById('status-filter').value;
  const filtered = allSubs.filter(s => {
    const matchQ  = !q || (s.fullName || '').toLowerCase().includes(q) || (s.parentName || '').toLowerCase().includes(q);
    const matchTy = !ty || (s.formType || 'enrollment') === ty;
    const matchSt = !st || (s.status || 'pending') === st;
    return matchQ && matchTy && matchSt;
  });
  renderTable(filtered);
};

window.clearFilters = function() {
  document.getElementById('search-input').value = '';
  document.getElementById('type-filter').value = '';
  document.getElementById('status-filter').value = '';
  applyFilters();
};

function typeBadge(t) {
  return t === 'trial'
    ? '<span class="px-2 py-0.5 rounded-full text-[11px] font-bold bg-purple-50 text-purple-700">Trial</span>'
    : '<span class="px-2 py-0.5 rounded-full text-[11px] font-bold bg-blue-50 text-blue-700">Enrollment</span>';
}
function statusBadge(s) {
  return (s === 'active')
    ? '<span class="px-2 py-0.5 rounded-full text-[11px] font-bold bg-green-50 text-green-700">Approved</span>'
    : '<span class="px-2 py-0.5 rounded-full text-[11px] font-bold bg-amber-50 text-amber-700">Pending</span>';
}

function renderTable(list) {
  document.getElementById('result-count').textContent = `${list.length} submission${list.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('enroll-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-16 text-text-muted">
      <span class="material-symbols-outlined text-4xl block mb-2 opacity-30">assignment</span>
      <p class="font-semibold text-sm">No submissions found</p>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(s => {
    const ft = s.formType || 'enrollment';
    return `
    <tr class="enroll-row border-b border-border-subtle last:border-0 transition-colors" data-sid="${escAttr(s.id)}">
      <td class="px-6 py-3.5">
        <p class="font-semibold text-on-surface">${escHtml(s.fullName || '—')}</p>
        ${s.parentName ? `<p class="text-xs text-text-muted mt-0.5">${escHtml(s.parentName)}</p>` : ''}
      </td>
      <td class="px-4 py-3.5 hidden sm:table-cell">${typeBadge(ft)}</td>
      <td class="px-4 py-3.5 hidden md:table-cell text-text-muted">${escHtml(fmtDate(s.createdAt))}</td>
      <td class="px-4 py-3.5">${statusBadge(s.status || 'pending')}</td>
      <td class="px-6 py-3.5 text-right">
        <button data-action="view" data-sid="${escAttr(s.id)}"
                class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg border border-border-subtle text-xs font-semibold text-text-muted hover:text-secondary hover:border-secondary transition-colors">
          <span class="material-symbols-outlined text-[15px]">visibility</span> View
        </button>
      </td>
    </tr>`;
  }).join('');
}

document.getElementById('enroll-tbody').addEventListener('click', e => {
  const sid = e.target.closest('[data-sid]')?.dataset.sid;
  if (sid) openDetail(sid);
});

// ── Detail modal ─────────────────────────────────────────────────────────────
window.openDetail = function(sid) {
  const s = allSubs.find(x => x.id === sid);
  if (!s) return;
  currentSub = s;
  const ft = s.formType || 'enrollment';

  document.getElementById('detail-name').textContent = s.fullName || 'Submission';
  document.getElementById('detail-type-badge').outerHTML =
    `<span id="detail-type-badge" class="flex-shrink-0">${typeBadge(ft)}</span>`;
  document.getElementById('detail-status-badge').outerHTML =
    `<span id="detail-status-badge" class="flex-shrink-0">${statusBadge(s.status || 'pending')}</span>`;

  const emails = Array.isArray(s.parentEmails) && s.parentEmails.length
    ? s.parentEmails.join(', ')
    : (s.parentEmail || '');
  const courses = Array.isArray(s.courses) ? s.courses.join(', ') : (s.courses || '');

  document.getElementById('detail-body').innerHTML = `
    <p class="text-xs text-text-muted mb-5">Submitted ${escHtml(fmtDateTime(s.createdAt))}</p>

    ${section('Parent Information', [
      field('Full Name', s.parentName),
      field('Email', emails),
      field('Contact Number', s.parentPhone),
      field('Home Address', s.parentAddress, true),
      field('How heard about us', s.howHeardAboutUs),
      field('Other children at Cremona', s.siblingsAtCremona),
    ])}

    ${section('Student Information', [
      field('Full Name', s.fullName),
      field('Date of Birth', s.dateOfBirth),
      field('IC / Passport Number', s.icNumber),
      field('Current School', s.currentSchool),
    ])}

    ${section('Course Information', [
      field('Courses', courses, true),
      field(ft === 'trial' ? 'Appointment Day & Time Offered' : 'Preferred Appointment Time', s.preferredAppointmentTime, true),
    ])}

    ${icPhotosBlock(s)}
    ${receiptBlock(s)}
  `;

  const approveBtn = document.getElementById('detail-approve-btn');
  approveBtn.classList.toggle('hidden', (s.status || 'pending') === 'active');

  document.getElementById('detail-modal').classList.remove('hidden');
};

window.closeDetail = function() {
  document.getElementById('detail-modal').classList.add('hidden');
  currentSub = null;
};

function section(title, fields) {
  const inner = fields.filter(Boolean).join('');
  if (!inner) return '';
  return `<div class="mb-5">
    <h3 class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-2">${title}</h3>
    <div class="grid grid-cols-2 gap-x-8 gap-y-3 text-sm">${inner}</div>
  </div>`;
}
function field(label, val, full) {
  if (!val) return '';
  return `<div class="${full ? 'col-span-2' : ''}">
    <p class="text-xs text-text-muted font-semibold uppercase tracking-wide mb-0.5">${escHtml(label)}</p>
    <p class="font-medium whitespace-pre-wrap">${escHtml(val)}</p>
  </div>`;
}

function icPhotosBlock(s) {
  if (!s.icFrontUrl && !s.icBackUrl) return '';
  const thumb = (url, label) => url ? `
    <a href="${escAttr(url)}" target="_blank" rel="noopener" class="group flex flex-col items-center gap-1">
      <img src="${escAttr(url)}" alt="${label}" class="w-32 h-20 object-cover rounded-lg border border-border-subtle shadow-sm group-hover:opacity-80 transition-opacity"/>
      <span class="text-[11px] text-text-muted font-medium">${label}</span>
    </a>` : '';
  return `<div class="mb-5">
    <h3 class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-2">IC Photos</h3>
    <div class="flex gap-3">${thumb(s.icFrontUrl, 'Front')}${thumb(s.icBackUrl, 'Back')}</div>
  </div>`;
}

function receiptBlock(s) {
  if (!s.paymentReceiptUrl) return '';
  const url = s.paymentReceiptUrl;
  const isImg = /\.(jpg|jpeg|png|heic)(\?|$)/i.test(url);
  const inner = isImg
    ? `<a href="${escAttr(url)}" target="_blank" rel="noopener" class="group inline-block">
         <img src="${escAttr(url)}" alt="Payment receipt" class="max-h-40 rounded-lg border border-border-subtle shadow-sm group-hover:opacity-80 transition-opacity"/>
       </a>`
    : `<a href="${escAttr(url)}" target="_blank" rel="noopener"
          class="inline-flex items-center gap-2 px-4 py-2.5 rounded-lg border border-border-subtle text-sm font-semibold text-secondary hover:bg-secondary/5 transition-colors">
         <span class="material-symbols-outlined text-[18px]">picture_as_pdf</span> Open receipt (PDF)
       </a>`;
  return `<div class="mb-2">
    <h3 class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-2">Payment Receipt (RM150)</h3>
    ${inner}
  </div>`;
}

// ── Approve ──────────────────────────────────────────────────────────────────
window.approveCurrent = async function() {
  if (!currentSub) return;
  const btn = document.getElementById('detail-approve-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#3E2C23;border-color:rgba(62,44,35,.25)"></div> Approving…';
  try {
    await updateDoc(doc(db, 'students', currentSub.id), { status: 'active' });
    currentSub.status = 'active';
    const idx = allSubs.findIndex(x => x.id === currentSub.id);
    if (idx !== -1) allSubs[idx].status = 'active';
    showToast('Submission approved.', 'success');
    closeDetail();
    applyFilters();
  } catch (e) {
    console.error('[approve]', e);
    showToast('Failed to approve: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">check_circle</span> Approve';
  }
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function toDate(v) {
  if (!v) return new Date(0);
  if (typeof v.toDate === 'function') return v.toDate();
  return new Date(v);
}
function fmtDate(v) {
  const d = toDate(v);
  return d.getTime() === 0 ? '—' : d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function fmtDateTime(v) {
  const d = toDate(v);
  return d.getTime() === 0 ? '—' : d.toLocaleString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}
function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
window.showToast = function(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3500);
};
</script>
  <script>window.CREMONA_NAV={portal:'admin',active:'enrollments',title:'Enrollments'};</script>
  <script src="/js/portal-nav.js"></script>
</body>
</html>
