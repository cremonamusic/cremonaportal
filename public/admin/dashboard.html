<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Home | Cremona Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style> body { font-family: 'Inter', sans-serif; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; } </style>
<script>
  tailwind.config = { theme: { extend: { colors: {
    'primary': '#3B2A1E', 'primary-container': '#C8A951', 'on-primary-fixed': '#2A1D14',
    'secondary': '#7A5A16', 'surface-white': '#FFFFFF', 'surface': '#FAF6EF',
    'surface-container': '#F1E9DC', 'surface-container-low': '#F6F0E6',
    'on-surface': '#2B2019', 'on-surface-variant': '#6B5844',
    'border-subtle': '#E2D7C6', 'text-muted': '#7A6A57', 'error': '#B3261E', 'success': '#1e6e3b',
  }}}};
</script>
<script src="/js/theme.js"></script>
<script src="/js/admin-guard.js"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col" data-portal="admin">

<header class="bg-surface-white border-b border-border-subtle shadow-sm sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
    <img src="/logo.png" alt="Cremona Music" class="h-8 w-auto rounded-lg"/>
  </div>
</header>

<main class="flex-1 max-w-5xl mx-auto w-full px-6 py-8">
  <div class="mb-6">
    <h1 id="greeting" class="text-2xl font-bold">Welcome back</h1>
    <p id="today-line" class="text-sm text-text-muted mt-1">—</p>
  </div>

  <!-- stat cards -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-8" id="stats">
    <a data-mod="accounts" href="/admin/accounts" class="bg-surface-white border border-border-subtle rounded-2xl p-4 hover:border-secondary transition-colors">
      <p id="st-teachers" class="text-2xl font-extrabold">–</p>
      <p class="text-xs text-text-muted font-semibold mt-1">Teachers</p>
    </a>
    <a data-mod="accounts" href="/admin/accounts" class="bg-surface-white border border-border-subtle rounded-2xl p-4 hover:border-secondary transition-colors">
      <p id="st-parents" class="text-2xl font-extrabold">–</p>
      <p class="text-xs text-text-muted font-semibold mt-1">Parents</p>
    </a>
    <a data-mod="students" href="/admin/students" class="bg-surface-white border border-border-subtle rounded-2xl p-4 hover:border-secondary transition-colors">
      <p id="st-students" class="text-2xl font-extrabold">–</p>
      <p class="text-xs text-text-muted font-semibold mt-1">Students</p>
    </a>
    <a data-mod="schedule" href="/admin/schedule-admin" class="bg-surface-white border border-border-subtle rounded-2xl p-4 hover:border-secondary transition-colors">
      <p id="st-classes" class="text-2xl font-extrabold text-secondary">–</p>
      <p class="text-xs text-text-muted font-semibold mt-1">Classes Today</p>
    </a>
    <a data-mod="accounts" href="/admin/accounts" class="bg-surface-white border border-border-subtle rounded-2xl p-4 hover:border-secondary transition-colors">
      <p id="st-certs" class="text-2xl font-extrabold text-amber-600">–</p>
      <p class="text-xs text-text-muted font-semibold mt-1">Pending Certificates</p>
    </a>
    <a data-mod="reports" href="/admin/comments-admin" class="bg-surface-white border border-border-subtle rounded-2xl p-4 hover:border-secondary transition-colors">
      <p id="st-reports" class="text-2xl font-extrabold text-error">–</p>
      <p class="text-xs text-text-muted font-semibold mt-1">Comments to Confirm</p>
    </a>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- today's classes -->
    <section data-mod="schedule" class="bg-surface-white p-6 rounded-2xl shadow-sm border border-border-subtle">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold">Today's Classes</h2>
        <a href="/admin/schedule-admin" class="text-xs font-bold text-secondary hover:underline">Open Schedule →</a>
      </div>
      <div id="today-classes" class="flex flex-col gap-2">
        <p class="text-sm text-text-muted">Loading…</p>
      </div>
    </section>

    <!-- needs attention -->
    <section data-mod="accounts" class="bg-surface-white p-6 rounded-2xl shadow-sm border border-border-subtle">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold">Needs Your Attention</h2>
      </div>
      <div id="attention" class="flex flex-col gap-2">
        <p class="text-sm text-text-muted">Loading…</p>
      </div>
    </section>

    <!-- recent sign-ins -->
    <section data-mod="security" class="bg-surface-white p-6 rounded-2xl shadow-sm border border-border-subtle lg:col-span-2">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold">Recent Sign-ins</h2>
        <a href="/admin/security" class="text-xs font-bold text-secondary hover:underline">Security Page →</a>
      </div>
      <div id="recent-logins" class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <p class="text-sm text-text-muted">Loading…</p>
      </div>
    </section>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection, query, where, getDocs, Timestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "REPLACE_ME_CREMONA_API_KEY",
  authDomain: "portal.cremonamusic.com", projectId: "cremona-portal",
  storageBucket: "cremona-portal.firebasestorage.app",
  messagingSenderId: "REPLACE_ME_SENDER_ID", appId: "REPLACE_ME_APP_ID"
});
const auth = getAuth(app);
const db = getFirestore(app);

function esc(x) { return String(x ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

onAuthStateChanged(auth, async (user) => {
  if (!user) { location.href = '/'; return; }
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || snap.data().role !== 'admin' || snap.data().status === 'inactive' || snap.data().status === 'deleted') {
      location.href = '/';
      return;
    }
    if (!window.applyAdminPermissions(snap.data(), '')) return;
    const d = snap.data();
    // limited admins only see what their permissions include
    const perms = Array.isArray(d.adminPermissions) ? d.adminPermissions : null;
    window._can = (m) => !perms || perms.indexOf(m) !== -1;
    document.querySelectorAll('[data-mod]').forEach((el) => {
      if (!window._can(el.dataset.mod)) el.remove();
    });
    const h = new Date().getHours();
    const hi = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = `${hi}, Admin!`;
    document.getElementById('today-line').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    loadDashboard();
  } catch (e) {
    console.error('[admin home]', e);
    document.getElementById('today-line').textContent = 'Failed to load: ' + (e.message || e);
  }
});

async function loadDashboard() {
  const can = window._can || (() => true);
  // people counts
  if (can('accounts')) getDocs(collection(db, 'users')).then(snap => {
    let t = 0, p = 0;
    snap.forEach(x => {
      const u = x.data();
      if (u.status === 'deleted') return;
      if (u.role === 'teacher') t++;
      if (u.role === 'parent') p++;
    });
    document.getElementById('st-teachers').textContent = t;
    document.getElementById('st-parents').textContent = p;
  }).catch(() => {});

  if (can('students')) getDocs(collection(db, 'students')).then(snap => {
    document.getElementById('st-students').textContent = snap.size;
  }).catch(() => { document.getElementById('st-students').textContent = '—'; });

  // today's classes
  const start = new Date(); start.setHours(0, 0, 0, 0);
  const end = new Date(); end.setHours(23, 59, 59, 999);
  if (can('schedule')) getDocs(query(collection(db, 'sessions'),
      where('dateTime', '>=', Timestamp.fromDate(start)),
      where('dateTime', '<=', Timestamp.fromDate(end))))
    .then(snap => {
      const list = snap.docs.map(x => ({ id: x.id, ...x.data() }))
        .sort((a, b) => (a.dateTime?.seconds || 0) - (b.dateTime?.seconds || 0));
      document.getElementById('st-classes').textContent = list.filter(s => s.status !== 'cancelled').length;
      const box = document.getElementById('today-classes');
      if (!list.length) {
        box.innerHTML = '<p class="text-sm text-text-muted italic">No classes scheduled today.</p>';
        return;
      }
      box.innerHTML = list.slice(0, 8).map(s => {
        const when = s.dateTime?.seconds ? new Date(s.dateTime.seconds * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) : '—';
        const cancelled = s.status === 'cancelled';
        return `<div class="flex items-center gap-3 px-3 py-2 rounded-lg border border-border-subtle ${cancelled ? 'opacity-50' : ''}">
          <span class="text-sm font-bold w-12 flex-shrink-0 ${cancelled ? 'line-through' : 'text-secondary'}">${esc(when)}</span>
          <div class="min-w-0 flex-1">
            <p class="text-sm font-semibold truncate">${esc(s.studentName || '—')}</p>
            <p class="text-xs text-text-muted truncate">${esc(s.teacherName || '')}${s.subject ? ' · ' + esc(s.subject) : ''}</p>
          </div>
          ${cancelled ? '<span class="text-[10px] font-bold uppercase text-error flex-shrink-0">Cancelled</span>'
            : s.isReplacement ? '<span class="text-[10px] font-bold uppercase text-purple-700 flex-shrink-0">보강</span>' : ''}
        </div>`;
      }).join('') + (list.length > 8 ? `<p class="text-xs text-text-muted text-center">+ ${list.length - 8} more on the Schedule page</p>` : '');
    }).catch(e => {
      console.error(e);
      document.getElementById('today-classes').innerHTML = '<p class="text-xs text-error">Failed to load classes.</p>';
      document.getElementById('st-classes').textContent = '—';
    });

  // attention: pending certificates + unsigned contracts
  if (can('accounts')) Promise.all([
    getDocs(query(collection(db, 'certificateRequests'), where('status', '==', 'pending'))).catch(() => null),
    getDocs(query(collection(db, 'contracts'), where('status', '==', 'pending_signature'))).catch(() => null),
  ]).then(([certs, contracts]) => {
    const items = [];
    if (certs) {
      document.getElementById('st-certs').textContent = certs.size;
      certs.forEach(x => {
        const r = x.data();
        items.push(`<a href="/admin/accounts" class="flex items-center gap-3 px-3 py-2 rounded-lg border border-amber-200 bg-amber-50/50 hover:border-amber-400 transition-colors">
          <span class="material-symbols-outlined text-amber-600 text-[18px]">workspace_premium</span>
          <span class="text-sm min-w-0 truncate"><b>${esc(r.teacherName)}</b> requested a certificate — ${esc(r.purpose || '')}</span>
        </a>`);
      });
    } else {
      document.getElementById('st-certs').textContent = '—';
    }
    if (contracts) contracts.forEach(x => {
      const c = x.data();
      items.push(`<a href="/contract?id=${x.id}" target="_blank" class="flex items-center gap-3 px-3 py-2 rounded-lg border border-border-subtle hover:border-secondary transition-colors">
        <span class="material-symbols-outlined text-secondary text-[18px]">contract</span>
        <span class="text-sm min-w-0 truncate"><b>${esc(c.teacherName)}</b> hasn't signed "${esc(c.title || 'contract')}" yet</span>
      </a>`);
    });
    document.getElementById('attention').innerHTML = items.join('')
      || '<p class="text-sm text-text-muted italic">All clear — nothing waiting on you. 🎉</p>';
  });

  // recent sign-ins
  if (can('security')) getDocs(collection(db, 'loginLogs')).then(snap => {
    const logs = snap.docs.map(x => x.data())
      .sort((a, b) => (b.at?.seconds || 0) - (a.at?.seconds || 0)).slice(0, 6);
    const box = document.getElementById('recent-logins');
    box.innerHTML = logs.map(l => {
      const when = l.at?.seconds ? new Date(l.at.seconds * 1000).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }) : '—';
      return `<div class="flex items-center gap-3 px-3 py-2 rounded-lg border border-border-subtle">
        <span class="material-symbols-outlined text-success text-[18px]">login</span>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold truncate">${esc(l.name || l.email || '—')}
            <span class="font-normal text-xs text-text-muted">· ${esc(l.role || '')}</span></p>
          <p class="text-xs text-text-muted truncate">${esc(when)}${l.location ? ' · ' + esc(l.location) : ''}</p>
        </div>
      </div>`;
    }).join('') || '<p class="text-sm text-text-muted italic">No sign-ins recorded yet.</p>';
  }).catch(() => {
    document.getElementById('recent-logins').innerHTML = '<p class="text-xs text-error">Failed to load.</p>';
  });

  // teacher reports waiting for admin confirmation
  if (can('reports')) getDocs(query(collection(db, 'comments'), where('status', '==', 'pending'))).then(snap => {
    document.getElementById('st-reports').textContent = snap.size;
  }).catch(() => { document.getElementById('st-reports').textContent = '—'; });
}
</script>
<script src="/js/notifbell.js?v=4" defer></script>
<script src="/js/portal-nav.js?v=1" defer></script>
</body>
</html>
