<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  body { font-family:'Inter',sans-serif; }
  .spinner { width:20px;height:20px;border:2px solid rgba(201,162,39,.2);border-top-color:#C9A227;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity:1; }
  #toast.error   { background:#ba1a1a;color:#fff; }
  #toast.success { background:#1e6e3b;color:#fff; }
  #toast.info    { background:#3B2A1E;color:#F5EFE4; }

<body class="bg-background text-on-surface selection:bg-primary-fixed-dim">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">

</div>
<div id="toast"></div>

<!-- ── Report Detail Modal ─────────────────────────────────────────────────── -->
<div id="detail-modal" class="hidden fixed inset-0 bg-black/40 z-[100] flex items-start justify-center p-4 pt-12 overflow-y-auto" onclick="if(event.target===this)closeDetailModal()">
  <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl mb-8">

    <div class="flex items-center justify-between px-6 py-5 border-b border-border-subtle">
      <h2 class="font-headline-sm">Progress Report</h2>
      <button onclick="closeDetailModal()" class="text-text-muted hover:text-on-surface p-1 rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div id="detail-body" class="px-6 py-5 flex flex-col gap-5">
      <!-- populated by openDetailModal() -->
    </div>

    <div class="flex items-center justify-end gap-3 px-6 pb-5 border-t border-border-subtle pt-4" id="detail-actions">
      <!-- approve / decline buttons -->
    </div>
  </div>
</div>

<!-- ── Decline Modal ───────────────────────────────────────────────────────── -->
<div id="decline-modal" class="hidden fixed inset-0 bg-black/40 z-[110] flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between px-6 py-5 border-b border-border-subtle">
      <h2 class="font-headline-sm">Decline Report</h2>
      <button onclick="closeDeclineModal()" class="text-text-muted hover:text-on-surface p-1 rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined">close</span>

    </div>
    <div class="px-6 py-5">
      <label class="block text-label-md text-on-surface-variant mb-2">Reason for declining <span class="text-error">*</span></label>
      <textarea id="decline-reason" rows="4" placeholder="Explain what needs to be corrected or added..."
                class="w-full border border-border-subtle rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none resize-none"></textarea>
    </div>
    <div class="flex justify-end gap-3 px-6 pb-5">
      <button onclick="closeDeclineModal()" class="px-4 py-2.5 text-sm font-medium text-text-muted border border-border-subtle rounded-lg hover:bg-surface-container transition-colors">Cancel</button>
      <button id="decline-submit-btn" onclick="submitDecline()" class="px-5 py-2.5 text-sm font-bold bg-error text-white rounded-lg hover:brightness-110 active:scale-95 transition-all">Decline Report</button>
    </div>
  </div>
</div>

<main class="max-w-[1200px] mx-auto px-10 py-6">

  <!-- Page header -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-6">
    <div>
      <h1 class="font-headline-lg text-on-surface mb-1">Student Progress Reports</h1>
      <p class="font-body-md text-text-muted">Review and approve reports submitted by teachers.</p>
    </div>
    <div class="flex items-center gap-2">
      <span id="result-count" class="text-label-sm text-text-muted"></span>
    </div>

  <!-- Filter tabs -->
  <div class="flex gap-2 mb-5 flex-wrap">
    <button class="tab-btn active px-4 py-2 text-sm font-semibold rounded-lg border border-border-subtle" data-tab="all"      onclick="setTab('all')">All</button>
    <button class="tab-btn       px-4 py-2 text-sm font-semibold rounded-lg border border-border-subtle bg-white text-text-muted" data-tab="pending"  onclick="setTab('pending')">
      Pending <span id="badge-pending" class="ml-1 px-1.5 py-0.5 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full"></span>

    <button class="tab-btn       px-4 py-2 text-sm font-semibold rounded-lg border border-border-subtle bg-white text-text-muted" data-tab="approved" onclick="setTab('approved')">Approved</button>

  </div>

  <!-- Search row -->
  <div class="bg-surface-white border border-border-subtle rounded-xl p-4 shadow-sm mb-5 flex flex-wrap gap-3 items-end">

        <input id="search-input" type="text" placeholder="Student or teacher name..." oninput="applyFilters()"
               class="w-full pl-9 pr-3 py-2 border border-border-subtle rounded-lg text-sm focus:ring-2 focus:ring-secondary/30 focus:border-secondary outline-none"/>
      </div>
    </div>
    <button onclick="clearSearch()" class="text-sm text-text-muted hover:text-error transition-colors px-2">Clear</button>

  <!-- Reports table -->
  <div class="bg-surface-white border border-border-subtle rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-border-subtle">
          <th class="text-left px-6 py-3.5 font-label-md text-text-muted">Student</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted hidden sm:table-cell">Teacher</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted hidden md:table-cell">Date Range</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted">Status</th>
          <th class="text-left px-4 py-3.5 font-label-md text-text-muted hidden lg:table-cell">Submitted</th>
        </tr>

      <tbody id="reports-tbody">
        <tr><td colspan="5" class="text-center py-12 text-text-muted">
          <div class="flex items-center justify-center gap-3"><div class="spinner"></div> Loading reports…</div>
        </td></tr>
      </tbody>
    </table>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection,
  getDocs, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── EmailJS placeholders — fill these in before deploying ─────────────────────
const EMAILJS_REPORT_SERVICE_ID  = 'service_1vo2fln';
const EMAILJS_REPORT_TEMPLATE_ID = 'template_vzvn67y';
const EMAILJS_PUBLIC_KEY         = 'dc-ORwhDtS1wn-ezz';

const app = initializeApp({
  apiKey: "AIzaSyB_TQF-oExYsPY4qOJtfrcDCwXbc4HV0-0",
  authDomain: "cremonamusic-portal.firebaseapp.com",
  projectId: "cremonamusic-portal",
  storageBucket: "cremonamusic-portal.firebasestorage.app",
  messagingSenderId: "227259733472",
  appId: "1:227259733472:web:3cb86ab0da1d5338858785"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──────────────────────────────────────────────────────────────────────
let currentAdminUid  = null;
let allReports       = [];
let filteredReports  = [];
let currentTab       = 'all';
let selectedReport   = null;
let decliningId      = null;

// ── Auth ───────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/index.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().role !== 'admin') {
    window.location.href = '/home.html'; return;
  }
  currentAdminUid = user.uid;
  await loadReports();
  document.getElementById('loading-overlay').style.display = 'none';
});

window.doSignOut = async () => { await signOut(auth); window.location.href = '/index.html'; };

// ── Load reports ───────────────────────────────────────────────────────────────
async function loadReports() {
  const snap = await getDocs(collection(db, 'reports'));
  allReports = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
  updatePendingBadge();
  applyFilters();
}

function updatePendingBadge() {
  const count = allReports.filter(r => r.status === 'pending').length;
  const badge = document.getElementById('badge-pending');
  badge.textContent = count > 0 ? count : '';
  badge.style.display = count > 0 ? '' : 'none';
}

// ── Tabs & filters ─────────────────────────────────────────────────────────────
window.setTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const isActive = btn.dataset.tab === tab;
    btn.classList.toggle('active', isActive);
    btn.classList.toggle('bg-white', !isActive);
    btn.classList.toggle('text-text-muted', !isActive);
  });
  applyFilters();
};

window.applyFilters = function() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  filteredReports = allReports.filter(r => {
    const matchTab = currentTab === 'all' || r.status === currentTab;
    const matchQ   = !q ||
      (r.studentName || '').toLowerCase().includes(q) ||
      (r.teacherName  || '').toLowerCase().includes(q);
    return matchTab && matchQ;
  });
  renderTable();
};

window.clearSearch = function() {
  document.getElementById('search-input').value = '';
  applyFilters();
};

// ── Render table ───────────────────────────────────────────────────────────────
function renderTable() {
  const count = filteredReports.length;
  document.getElementById('result-count').textContent = `${count} report${count !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('reports-tbody');
  if (!count) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-16 text-text-muted">
      <span class="material-symbols-outlined text-4xl block mb-2 opacity-30">assignment</span>
      <p class="font-semibold text-sm">No reports found</p>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = filteredReports.map(r => {
    const badge = statusBadge(r.status);
    const dateRange = r.dateRangeStart && r.dateRangeEnd
      ? `${r.dateRangeStart} – ${r.dateRangeEnd}` : (r.dateRangeStart || '—');
    const createdStr = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString() : '—';
    return `<tr class="report-row border-b border-border-subtle last:border-0 transition-colors" data-rid="${escAttr(r.id)}">
      <td class="px-6 py-3.5">
        <p class="font-semibold text-on-surface">${escHtml(r.studentName || '—')}</p>
      </td>
      <td class="px-4 py-3.5 hidden sm:table-cell text-text-muted">${escHtml(r.teacherName || '—')}</td>
      <td class="px-4 py-3.5 hidden md:table-cell text-text-muted text-sm">${escHtml(dateRange)}</td>
      <td class="px-4 py-3.5">${badge}</td>
      <td class="px-4 py-3.5 hidden lg:table-cell text-text-muted text-sm">${createdStr}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr.report-row').forEach(row => {
    row.addEventListener('click', () => {
      const r = allReports.find(x => x.id === row.dataset.rid);
      if (r) openDetailModal(r);
    });
  });
}

function statusBadge(status) {
  if (status === 'approved') return `<span class="px-2 py-0.5 bg-green-100 text-green-700 text-xs font-bold rounded-full">Approved</span>`;
  if (status === 'declined') return `<span class="px-2 py-0.5 bg-red-100 text-error text-xs font-bold rounded-full">Declined</span>`;
  return `<span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">Pending</span>`;
}

// ── Detail modal ───────────────────────────────────────────────────────────────
window.openDetailModal = function(report) {
  selectedReport = report;

  const body = document.getElementById('detail-body');
  const booksHtml = report.books?.length
    ? report.books.map(b => `<span class="px-2 py-0.5 bg-surface-container-low border border-border-subtle text-sm rounded-full">${escHtml(b.title || b.bookId)}</span>`).join(' ')
    : '<span class="text-text-muted text-sm">None specified</span>';

  const catsHtml = report.categories?.length ? `
    <table class="w-full text-sm border border-border-subtle rounded-lg overflow-hidden">
      <thead><tr class="bg-surface-container-low border-b border-border-subtle">
        <th class="text-left px-4 py-2 font-semibold text-on-surface-variant w-1/3">Category</th>
        <th class="text-left px-4 py-2 font-semibold text-on-surface-variant">Feedback</th>
      </tr></thead>
      <tbody>
        ${report.categories.map(c => `<tr class="border-b border-border-subtle last:border-0">
          <td class="px-4 py-2.5 font-semibold text-on-surface align-top">${escHtml(c.name || '')}</td>
          <td class="px-4 py-2.5 text-on-surface-variant">${escHtml(c.feedback || '—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<p class="text-text-muted text-sm">No categories.</p>';

  const enhHtml = report.enhancementAreas?.length
    ? `<ul class="list-disc list-inside space-y-1 text-sm text-on-surface-variant">
        ${report.enhancementAreas.map(e => `<li>${escHtml(e)}</li>`).join('')}
      </ul>`
    : '<p class="text-text-muted text-sm">None specified.</p>';

  const createdStr = report.createdAt?.toDate ? report.createdAt.toDate().toLocaleString() : '—';
  const reviewedStr = report.reviewedAt?.toDate ? report.reviewedAt.toDate().toLocaleString() : null;

  body.innerHTML = `
    <!-- Header info -->
    <div class="grid grid-cols-2 gap-x-6 gap-y-3 text-sm">
      <div>
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Student</p>
        <p class="font-semibold text-on-surface">${escHtml(report.studentName || '—')}</p>
      </div>
      <div>
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Teacher</p>
        <p class="font-semibold text-on-surface">${escHtml(report.teacherName || '—')}</p>
      </div>
      <div>
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Date Range</p>
        <p>${escHtml(report.dateRangeStart || '—')} – ${escHtml(report.dateRangeEnd || '—')}</p>
      </div>
      <div>
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Class Time</p>
        <p>${escHtml(report.classTime || '—')}</p>
      </div>
      <div>
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Google Classroom</p>
        <p>${escHtml(report.googleClassroom || '—')}</p>
      </div>
      <div>
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Status</p>
        ${statusBadge(report.status)}
        ${report.status === 'declined' && report.declineReason
          ? `<p class="text-xs text-error mt-1"><span class="font-semibold">Reason:</span> ${escHtml(report.declineReason)}</p>` : ''}
      </div>
      <div class="col-span-2">
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Submitted</p>
        <p class="text-text-muted">${createdStr}</p>
      </div>
      ${reviewedStr ? `<div class="col-span-2">
        <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-0.5">Reviewed</p>
        <p class="text-text-muted">${reviewedStr}</p>
      </div>` : ''}
    </div>

    <!-- Books -->
    <div>
      <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-2">Books Studied</p>
      <div class="flex flex-wrap gap-2">${booksHtml}</div>
    </div>

    <!-- Feedback table -->
    <div>
      <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-2">Feedback Categories</p>
      ${catsHtml}
    </div>

    <!-- Enhancements -->
    <div>
      <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-2">Areas for Enhancement</p>
      ${enhHtml}
    </div>

    <!-- Evaluation -->
    ${report.evaluation ? `<div>
      <p class="text-xs font-bold uppercase tracking-wide text-text-muted mb-2">Overall Evaluation</p>
      <p class="text-sm text-on-surface leading-relaxed whitespace-pre-wrap border border-border-subtle rounded-lg px-4 py-3 bg-surface-container-low">${escHtml(report.evaluation)}</p>
    </div>` : ''}
  `;

  // Action buttons
  const actions = document.getElementById('detail-actions');
  if (report.status === 'pending') {
    actions.innerHTML = `
      <button onclick="closeDetailModal()" class="px-4 py-2.5 text-sm font-medium text-text-muted border border-border-subtle rounded-lg hover:bg-surface-container transition-colors">Close</button>
      <button id="open-decline-btn" onclick="openDeclineModal('${escAttr(report.id)}')"
              class="px-5 py-2.5 text-sm font-bold bg-error text-white rounded-lg hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">cancel</span> Decline
      </button>
      <button id="approve-btn" onclick="approveReport('${escAttr(report.id)}')"
              class="px-5 py-2.5 text-sm font-bold bg-green-600 text-white rounded-lg hover:brightness-110 active:scale-95 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">check_circle</span> Approve
      </button>`;
  } else {
    actions.innerHTML = `<button onclick="closeDetailModal()" class="px-4 py-2.5 text-sm font-medium text-text-muted border border-border-subtle rounded-lg hover:bg-surface-container transition-colors">Close</button>`;
  }

  document.getElementById('detail-modal').classList.remove('hidden');
};

window.closeDetailModal = function() {
  document.getElementById('detail-modal').classList.add('hidden');
  selectedReport = null;
};

// ── Approve ────────────────────────────────────────────────────────────────────
window.approveReport = async function(reportId) {
  const report = allReports.find(r => r.id === reportId);
  if (!report) return;

  const btn = document.getElementById('approve-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="border-top-color:#fff;border-color:rgba(255,255,255,.3)"></div><span>Approving...</span>'; }

  try {
    await updateDoc(doc(db, 'reports', reportId), {
      status:      'approved',
      reviewedAt:  serverTimestamp(),
      reviewedBy:  currentAdminUid,
      updatedAt:   serverTimestamp(),
    });

    // Fetch all linked parent emails from students collection
    let parentEmails = [];
    try {
      const studentSnap = await getDoc(doc(db, 'students', report.studentId));
      if (studentSnap.exists()) {
        const data = studentSnap.data();
        // Support both new parentEmails[] and legacy parentEmail string
        if (Array.isArray(data.parentEmails) && data.parentEmails.length) {
          parentEmails = data.parentEmails.filter(Boolean);
        } else if (data.parentEmail) {
          parentEmails = [data.parentEmail];
        }
      }
    } catch (e) {
      console.warn('[approveReport] could not fetch parent emails:', e.message);
    }

    // Send email to every linked parent via EmailJS
    if (parentEmails.length) {
      const baseParams = {
        student_name: report.studentName || '',
      };
      let sent = 0;
      for (const email of parentEmails) {
        try {
          await emailjs.send(EMAILJS_REPORT_SERVICE_ID, EMAILJS_REPORT_TEMPLATE_ID, { ...baseParams, parent_email: email }, EMAILJS_PUBLIC_KEY);
          sent++;
        } catch (emailErr) {
          console.error('[approveReport] EmailJS error for', email, ':', emailErr);
        }
      }
      if (sent === parentEmails.length) {
        showToast(`Report approved and email sent to ${sent > 1 ? `${sent} parents` : 'parent'}.`, 'success');
      } else if (sent > 0) {
        showToast(`Approved. Email sent to ${sent}/${parentEmails.length} parents.`, 'info');
      } else {
        showToast('Approved, but failed to send email(s).', 'info');
      }
    } else {
      showToast('Report approved. (No parent email on file.)', 'success');
    }

    // Update local state
    const idx = allReports.findIndex(r => r.id === reportId);
    if (idx !== -1) allReports[idx] = { ...allReports[idx], status: 'approved', reviewedBy: currentAdminUid };
    updatePendingBadge();
    applyFilters();
    closeDetailModal();
  } catch (e) {
    console.error('[approveReport]', e);
    showToast('Failed to approve: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check_circle</span> Approve'; }
  }
};

// ── Decline ────────────────────────────────────────────────────────────────────
window.openDeclineModal = function(reportId) {
  decliningId = reportId;
  document.getElementById('decline-reason').value = '';
  document.getElementById('decline-modal').classList.remove('hidden');
};

window.closeDeclineModal = function() {
  document.getElementById('decline-modal').classList.add('hidden');
  decliningId = null;
};

window.submitDecline = async function() {
  if (!decliningId) return;
  const reason = document.getElementById('decline-reason').value.trim();
  if (!reason) { showToast('Please enter a reason for declining.', 'error'); return; }

  const btn = document.getElementById('decline-submit-btn');
  btn.disabled = true; btn.textContent = 'Declining...';

  try {
    await updateDoc(doc(db, 'reports', decliningId), {
      status:        'declined',
      declineReason: reason,
      reviewedAt:    serverTimestamp(),
      reviewedBy:    currentAdminUid,
      updatedAt:     serverTimestamp(),
    });
    const idx = allReports.findIndex(r => r.id === decliningId);
    if (idx !== -1) allReports[idx] = { ...allReports[idx], status: 'declined', declineReason: reason, reviewedBy: currentAdminUid };
    updatePendingBadge();
    applyFilters();
    closeDeclineModal();
    closeDetailModal();
    showToast('Report declined.', 'info');
  } catch (e) {
    console.error('[submitDecline]', e);
    showToast('Failed to decline: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Decline Report';
  }
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.showToast = function(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => { t.className = ''; }, 3500);
};
</script>
</body>
</html>
