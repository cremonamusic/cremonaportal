<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection, query, where,
  getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyB_TQF-oExYsPY4qOJtfrcDCwXbc4HV0-0",
  authDomain:"cremonamusic-portal.firebaseapp.com",projectId:"cremonamusic-portal",
  storageBucket:"cremonamusic-portal.firebasestorage.app",
  messagingSenderId:"227259733472",appId:"1:227259733472:web:3cb86ab0da1d5338858785"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ──────────────────────────────────────────────────────────────────────
let allStudents       = [];
let allTeachers       = [];
let allParentEmails   = new Set();
let studentParentMap  = new Map(); // studentId → [{name, email}]
let editingId         = null;
let profileStudent    = null;
let selectedTeacherUids = new Set();

// ── Auth ───────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/index.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists() || snap.data().role !== 'admin') {
    window.location.href = '/index.html'; return;
  }
  await Promise.all([loadStudents(), loadTeachers(), loadParentEmails()]);
  console.log('[students] initial load complete — rendering table');
  applyFilters();
  document.getElementById('loading-overlay').style.display = 'none';
});

window.doSignOut = async () => { await signOut(auth); window.location.href = '/index.html'; };

// ── Load data ──────────────────────────────────────────────────────────────────
async function loadStudents() {
  const snap = await getDocs(collection(db, 'students'));
  allStudents = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (a.fullName || '').localeCompare(b.fullName || ''));
  // Do NOT render here — render happens after all parallel fetches complete
}

async function loadTeachers() {
  const q    = query(collection(db, 'users'), where('role', '==', 'teacher'));
  const snap = await getDocs(q);
  allTeachers = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  const sel = document.getElementById('teacher-filter');
  allTeachers.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id; opt.textContent = t.name || t.email || t.id;
    sel.appendChild(opt);
  });
}

async function loadParentEmails() {
  console.log('[loadParentEmails] starting fetch');
  const q = query(collection(db, 'users'), where('role', '==', 'parent'));
  const snap = await getDocs(q);
  allParentEmails = new Set();
  studentParentMap = new Map();
  snap.docs.forEach(d => {
    const p = d.data();
    const email = (p.email || '').toLowerCase();
    if (email) allParentEmails.add(email);
    (p.linkedStudentIds || []).forEach(sid => {
      const entry = { name: p.name || `${p.firstName || ''} ${p.lastName || ''}`.trim(), email: p.email || '' };
      const arr = studentParentMap.get(sid) || [];
      arr.push(entry);
      studentParentMap.set(sid, arr);
    });
  });
  console.log(`[loadParentEmails] done — ${allParentEmails.size} parent email(s), ${studentParentMap.size} student-parent link(s)`);
}

function parentStatusBadge(email) {
  if (!email) return '';
  const linked = allParentEmails.has(email.toLowerCase());
  return linked
    ? `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 bg-green-50 text-green-700 text-[11px] font-semibold rounded-full border border-green-200"><span class="material-symbols-outlined text-[12px]" style="font-variation-settings:'FILL' 1;">check_circle</span>Parent account linked</span>`
    : `<span class="inline-flex items-center gap-1 px-1.5 py-0.5 bg-amber-50 text-amber-700 text-[11px] font-semibold rounded-full border border-amber-200"><span class="material-symbols-outlined text-[12px]">person_add</span>No parent account yet</span>`;
}

window.updateParentEmailStatus = function() {
  const email = document.getElementById('f-parent-email').value.trim();
  const el = document.getElementById('parent-email-status');
  if (!email) { el.innerHTML = ''; el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  el.innerHTML = parentStatusBadge(email);
};

function hexToRgba(hex, alpha) {
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function teacherPill(uid) {
  const t = allTeachers.find(x => x.id === uid);
  if (!t) return '';
  const color = (t.color && /^#[0-9a-f]{6}$/i.test(t.color)) ? t.color : '#C9A227';
  const bg = hexToRgba(color, 0.09);
  return `<span style="display:inline-flex;align-items:center;padding:1px 8px;background:${bg};color:${color};border-radius:999px;font-size:11px;font-weight:600;line-height:18px;">${escHtml(t.name || t.email || uid)}</span>`;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderStudents(list) {
  document.getElementById('result-count').textContent = `${list.length} student${list.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('students-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="text-center py-16 text-text-muted">
      <span class="material-symbols-outlined text-4xl block mb-2 opacity-30">groups</span>
      <p class="font-semibold text-sm">No students found</p>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(s => `
    <tr class="student-row border-b border-border-subtle last:border-0 transition-colors" data-sid="${s.id}">
      <td class="px-6 py-3.5">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-primary-container/30 flex items-center justify-center text-primary font-bold text-sm flex-shrink-0">
            ${escHtml((s.fullName || '?').charAt(0).toUpperCase())}
          </div>
          <div>
            <p class="font-semibold text-on-surface">${escHtml(s.fullName || '—')}</p>
            ${(s.assignedTeachers || []).length ? `<div class="flex flex-wrap gap-1 mt-1">${(s.assignedTeachers).map(uid => teacherPill(uid)).filter(Boolean).join('')}</div>` : ''}
            ${(() => { const pts = studentParentMap.get(s.id); if (!pts || !pts.length) return ''; const label = pts.length === 1 ? (pts[0].name || pts[0].email) : `${pts[0].name || pts[0].email} +${pts.length - 1} more`; return `<div class="flex items-center gap-1 mt-0.5"><span class="material-symbols-outlined text-[11px] text-text-muted">family_restroom</span><span class="text-[11px] text-text-muted">${escHtml(label)}</span></div>`; })()}
          </div>
        </div>
      </td>
      <td class="px-4 py-3.5 hidden sm:table-cell">
        ${s.grade ? `<span class="px-2 py-0.5 bg-secondary/10 text-secondary text-xs font-bold rounded-full">${escHtml(s.grade)}</span>` : '<span class="text-text-muted">—</span>'}
      </td>
      <td class="px-6 py-3.5 text-right">
        <div class="flex items-center justify-end gap-1">
          <button data-action="edit" data-sid="${s.id}" class="p-1.5 rounded-lg hover:bg-surface-container text-text-muted hover:text-secondary transition-colors" title="Edit">
            <span class="material-symbols-outlined text-[16px]">edit</span>
          </button>
          <button data-action="delete" data-sid="${s.id}" class="p-1.5 rounded-lg hover:bg-error-container text-text-muted hover:text-error transition-colors" title="Delete">
            <span class="material-symbols-outlined text-[16px]">delete</span>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

// ── Filters ────────────────────────────────────────────────────────────────────
window.applyFilters = function() {
  console.log('[applyFilters] running — allParentEmails.size:', allParentEmails.size);
  const q  = document.getElementById('search-input').value.trim().toLowerCase();
  const g  = document.getElementById('grade-filter').value;
  const t  = document.getElementById('teacher-filter').value;
  const filtered = allStudents.filter(s => {
    const matchQ = !q || (s.fullName || '').toLowerCase().includes(q) || (s.parentName || '').toLowerCase().includes(q);
    const matchG = !g || s.grade === g;
    const matchT = !t || (s.assignedTeachers || []).includes(t);
    return matchQ && matchG && matchT;
  });
  renderStudents(filtered);
};

window.clearFilters = function() {
  document.getElementById('search-input').value = '';
  document.getElementById('grade-filter').value = '';
  document.getElementById('teacher-filter').value = '';
  renderStudents(allStudents);
};

// ── Table event delegation ─────────────────────────────────────────────────────
document.getElementById('students-tbody').addEventListener('click', e => {
  const action = e.target.closest('[data-action]')?.dataset.action;
  const sid    = e.target.closest('[data-sid]')?.dataset.sid;
  if (!sid) return;
  if (action === 'edit')   { e.stopPropagation(); openEditStudent(sid); return; }
  if (action === 'delete') { e.stopPropagation(); confirmDeleteStudent(sid); return; }
  // Row click → profile
  if (e.target.closest('tr.student-row')) openProfile(sid);
});

// ── Add / edit student modal ───────────────────────────────────────────────────
window.openAddStudent = function() {
  editingId = null;
  selectedTeacherUids = new Set();
  document.getElementById('student-modal-title').textContent = 'Add Student';
  document.getElementById('student-form').reset();
  renderTeacherCheckboxes();
  updateTeacherAssignLabel();
  document.getElementById('student-modal').classList.remove('hidden');
};

function openEditStudent(sid) {
  editingId = sid;
  const s = allStudents.find(x => x.id === sid);
  if (!s) return;
  selectedTeacherUids = new Set(s.assignedTeachers || []);
  document.getElementById('student-modal-title').textContent = 'Edit Student';
  document.getElementById('f-name').value         = s.fullName     || '';
  document.getElementById('f-dob').value          = s.dateOfBirth  || '';
  document.getElementById('f-grade').value        = s.grade        || '';
  document.getElementById('f-notes').value        = s.notes        || '';
  renderTeacherCheckboxes();
  updateTeacherAssignLabel();
  document.getElementById('student-modal').classList.remove('hidden');
}

window.closeStudentModal = function() {
  document.getElementById('student-modal').classList.add('hidden');
  document.getElementById('teacher-assign-dropdown').classList.add('hidden');
};

// ── Teacher assign dropdown ────────────────────────────────────────────────────
window.toggleTeacherDropdown = function() {
  const dd = document.getElementById('teacher-assign-dropdown');
  dd.classList.toggle('hidden');
};

function renderTeacherCheckboxes() {
  const dd = document.getElementById('teacher-assign-dropdown');
  if (!allTeachers.length) {
    dd.innerHTML = '<p class="text-text-muted text-sm text-center py-3">No teachers found.</p>';
    return;
  }
  dd.innerHTML = allTeachers.map(t => {
    const checked = selectedTeacherUids.has(t.id);
    const label   = escHtml(t.name || t.email || t.id);
    return `<label class="teacher-check-item flex items-center gap-3 px-4 py-2.5 cursor-pointer">
      <input type="checkbox" value="${t.id}" ${checked ? 'checked' : ''}
             onchange="toggleTeacherUid('${t.id}')"
             class="w-4 h-4 rounded border-border-subtle text-secondary focus:ring-secondary/30"/>
      <span class="text-sm text-on-surface">${label}</span>
    </label>`;
  }).join('');
}

window.toggleTeacherUid = function(uid) {
  if (selectedTeacherUids.has(uid)) selectedTeacherUids.delete(uid);
  else selectedTeacherUids.add(uid);
  updateTeacherAssignLabel();
};

function updateTeacherAssignLabel() {
  const label = document.getElementById('teacher-assign-label');
  if (!selectedTeacherUids.size) {
    label.textContent = 'No teachers assigned';
    label.className = 'text-text-muted';
    return;
  }
  const names = [...selectedTeacherUids].map(uid => {
    const t = allTeachers.find(x => x.id === uid);
    return t ? (t.name || t.email || uid) : uid;
  });
  label.textContent = names.join(', ');
  label.className = 'text-on-surface font-medium truncate';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#teacher-assign-wrapper')) {
    document.getElementById('teacher-assign-dropdown')?.classList.add('hidden');
  }
});

window.addEventListener('focus', async () => {
  await loadParentEmails();
  applyFilters();
});

window.saveStudent = async function() {
  const btn = document.getElementById('student-save-btn');
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Full name is required.', 'error'); return; }

  const data = {
    fullName:         name,
    dateOfBirth:      document.getElementById('f-dob').value,
    grade:            document.getElementById('f-grade').value,
    notes:            document.getElementById('f-notes').value.trim(),
    assignedTeachers: [...selectedTeacherUids],
  };

  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    if (editingId) {
      await updateDoc(doc(db, 'students', editingId), data);
      const idx = allStudents.findIndex(s => s.id === editingId);
      if (idx !== -1) allStudents[idx] = { id: editingId, ...allStudents[idx], ...data };
      showToast('Student updated.', 'success');
    } else {
      data.createdAt = serverTimestamp();
      const ref = await addDoc(collection(db, 'students'), data);
      allStudents.push({ id: ref.id, ...data });
      allStudents.sort((a, b) => (a.fullName || '').localeCompare(b.fullName || ''));
      showToast('Student added.', 'success');
    }
    closeStudentModal();
    applyFilters();
  } catch (e) {
    showToast('Failed to save: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Save Student'; btn.disabled = false;
  }
};

async function confirmDeleteStudent(sid) {
  const s = allStudents.find(x => x.id === sid);
  if (!s) return;
  if (!confirm(`Delete student "${s.fullName}"? This cannot be undone.`)) return;
  try {
    await deleteDoc(doc(db, 'students', sid));
    allStudents = allStudents.filter(x => x.id !== sid);
    applyFilters();
    showToast('Student deleted.', 'success');
  } catch (e) {
    showToast('Delete failed: ' + e.message, 'error');
  }
}

// ── Student profile ────────────────────────────────────────────────────────────
async function openProfile(sid) {
  profileStudent = allStudents.find(s => s.id === sid);
  if (!profileStudent) return;
  const s = profileStudent;

  document.getElementById('profile-name').textContent = s.fullName || '—';

  const infoDiv = document.getElementById('profile-info');
  const field = (label, val) => val
    ? `<div><p class="text-xs text-text-muted font-semibold uppercase tracking-wide mb-0.5">${label}</p><p class="font-medium">${escHtml(val)}</p></div>`
    : '';
  const linkedParents = studentParentMap.get(s.id) || [];
  const teacherPills  = (s.assignedTeachers || []).map(uid => teacherPill(uid)).filter(Boolean).join(' ');
  infoDiv.innerHTML = [
    field('Date of Birth', s.dateOfBirth),
    field('Grade', s.grade),
    teacherPills ? `<div class="col-span-2"><p class="text-xs text-text-muted font-semibold uppercase tracking-wide mb-1">Assigned Teachers</p><div class="flex flex-wrap gap-1">${teacherPills}</div></div>` : '',
    linkedParents.length ? `<div class="col-span-2"><p class="text-xs text-text-muted font-semibold uppercase tracking-wide mb-1">Linked Parent${linkedParents.length > 1 ? 's' : ''}</p><div class="flex flex-col gap-1">${linkedParents.map(p => `<div class="flex items-center gap-2"><span class="font-medium">${escHtml(p.name || '—')}</span>${p.email ? `<span class="text-xs text-text-muted">${escHtml(p.email)}</span>` : ''}</div>`).join('')}</div></div>` : '',
    s.notes ? `<div class="col-span-2">${field('Notes', s.notes)}</div>` : '',
    (s.icFrontUrl || s.icBackUrl) ? `<div class="col-span-2">
      <p class="text-xs text-text-muted font-semibold uppercase tracking-wide mb-2">IC Photos</p>
      <div class="flex gap-3">
        ${s.icFrontUrl ? `<a href="${escHtml(s.icFrontUrl)}" target="_blank" rel="noopener" class="group flex flex-col items-center gap-1">
          <img src="${escHtml(s.icFrontUrl)}" alt="IC Front" class="w-32 h-20 object-cover rounded-lg border border-border-subtle shadow-sm group-hover:opacity-80 transition-opacity"/>
          <span class="text-[11px] text-text-muted font-medium">Front</span>
        </a>` : ''}
        ${s.icBackUrl ? `<a href="${escHtml(s.icBackUrl)}" target="_blank" rel="noopener" class="group flex flex-col items-center gap-1">
          <img src="${escHtml(s.icBackUrl)}" alt="IC Back" class="w-32 h-20 object-cover rounded-lg border border-border-subtle shadow-sm group-hover:opacity-80 transition-opacity"/>
          <span class="text-[11px] text-text-muted font-medium">Back</span>
        </a>` : ''}
      </div>
    </div>` : '',
  ].join('');

  document.getElementById('profile-modal').classList.remove('hidden');

  // Load session history
  const sessDiv = document.getElementById('profile-sessions');
  sessDiv.innerHTML = '<div class="text-text-muted text-sm">Loading…</div>';
  try {
    const q    = query(collection(db, 'sessions'), where('studentId', '==', sid));
    const snap = await getDocs(q);
    const sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => toDate(b.dateTime) - toDate(a.dateTime));
    if (!sessions.length) {
      sessDiv.innerHTML = '<p class="text-text-muted text-sm">No sessions recorded.</p>';
    } else {
      const statusColors = { scheduled:'bg-blue-50 text-blue-700', completed:'bg-green-50 text-green-700', cancelled:'bg-gray-100 text-gray-500' };
      sessDiv.innerHTML = `
        <table class="w-full text-sm border-t border-border-subtle">
          <thead><tr>
            <th class="text-left py-2 text-xs text-text-muted font-semibold">Date</th>
            <th class="text-left py-2 text-xs text-text-muted font-semibold">Teacher</th>
            <th class="text-left py-2 text-xs text-text-muted font-semibold">Subject</th>
            <th class="text-left py-2 text-xs text-text-muted font-semibold">Duration</th>
            <th class="text-left py-2 text-xs text-text-muted font-semibold">Status</th>
          </tr></thead>
          <tbody>
            ${sessions.map(s => {
              const dt = toDate(s.dateTime);
              const sc = statusColors[s.status] || statusColors.scheduled;
              return `<tr class="border-t border-border-subtle">
                <td class="py-2 pr-4">${dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
                <td class="py-2 pr-4 text-text-muted">${escHtml(s.teacherName || '—')}</td>
                <td class="py-2 pr-4">${escHtml(s.subject || '—')}</td>
                <td class="py-2 pr-4 text-text-muted">${s.duration || '—'} min</td>
                <td class="py-2"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${sc}">${s.status || '—'}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }
  } catch (e) {
    sessDiv.innerHTML = `<p class="text-error text-sm">Failed to load sessions: ${e.message}</p>`;
  }
}

window.closeProfileModal = function() {
  document.getElementById('profile-modal').classList.add('hidden');
};

window.editCurrentStudent = function() {
  if (!profileStudent) return;
  closeProfileModal();
  openEditStudent(profileStudent.id);
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function toDate(v) {
  if (!v) return new Date(0);
  if (typeof v.toDate === 'function') return v.toDate();
  return new Date(v);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.showToast = function(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3500);
};
</script>
