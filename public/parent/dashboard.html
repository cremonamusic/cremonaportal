<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="/favicon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard | Cremona Music Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#C9A227", "primary-container": "#F5E5B0",
          "on-primary-fixed": "#3E2C23", "on-primary-container": "#8B6020",
          "secondary": "#C9A227", "secondary-fixed": "#F0E8C0",
          "surface": "#FAF6EF", "surface-white": "#FFFDF9",
          "surface-container": "#F0E8D6", "surface-container-low": "#F5EFE4",
          "on-surface": "#3E2C23", "on-surface-variant": "#7A5A42",
          "border-subtle": "#E8DCC8", "text-muted": "#8B6B52",
          "error": "#ba1a1a"
        },
        fontFamily: { sans: ["Inter", "sans-serif"] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #FAF6EF; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(201,162,39,0.15); border-top-color: #C9A227; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.35s ease-out both; }
  .child-card { transition: box-shadow 0.15s ease, transform 0.15s ease; }
  .child-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.10); transform: translateY(-2px); }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity:1; }
  #toast.error   { background:#ba1a1a; color:#fff; }
  #toast.success { background:#1e6e3b; color:#fff; }
  #toast.info    { background:#3B2A1E; color:#F5EFE4; }
</style>
<style id="cremona-palette">
/* Cremona Music Portal: header / footer / logo */
header { background-color: #3B2A1E !important; border-bottom-color: rgba(255,255,255,0.08) !important; box-shadow: 0 1px 5px rgba(0,0,0,0.4) !important; }
header img[src*="logo"] { filter: invert(1) brightness(1.2); }
header nav a, header nav button span:not(.material-symbols-outlined) { color: rgba(255,248,235,0.72) !important; }
header nav a:hover { color: #C9A227 !important; }
header nav a.nav-active, header nav a[class*="text-secondary"], header nav a[class*="border-secondary"], header nav a[class*="border-b-2"] { color: #C9A227 !important; border-color: #C9A227 !important; }
footer { background-color: #3B2A1E !important; border-top-color: rgba(255,255,255,0.08) !important; }
footer p, footer span:not(.material-symbols-outlined), footer small { color: rgba(255,248,235,0.65) !important; }
footer a { color: #C9A227 !important; }
footer a:hover { color: #E8DCC8 !important; }
footer img[src*="logo"] { filter: invert(1) brightness(1.2); }
</style>

<body class="text-on-surface min-h-screen flex flex-col">

<!-- Loading overlay -->
<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">
    <div class="spinner"></div>
    <p class="text-text-muted text-sm">Loading...</p>
  </div>
</div>

<div id="toast"></div>

<!-- Main -->
<main class="flex-1 max-w-4xl mx-auto w-full px-6 py-8">

  <!-- Announcements — populated by JS, hidden entirely when empty -->
  <div id="announcements-banner" class="hidden flex flex-col gap-4 mb-6"></div>

  <!-- Greeting -->

  </div>

  <!-- Children section -->
  <section>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-text-muted uppercase tracking-wide">Your Children</h2>
      <button onclick="openAddChildModal()"
              class="flex items-center gap-1.5 text-sm font-medium text-secondary hover:underline transition-colors">
        <span class="material-symbols-outlined text-[18px]">add_circle</span>
        Add Child
      </button>
    </div>
    <div id="children-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- populated by JS -->
    </div>

</main>

<!-- ── Add Child Modal ─────────────────────────────────────────────────────── -->
<div id="add-child-modal" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4"
     onclick="if(event.target===this)closeAddChildModal()">
  <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between px-6 py-5 border-b border-border-subtle">
      <h2 class="font-semibold text-base text-on-surface">Add a Child</h2>
      <button onclick="closeAddChildModal()" class="text-text-muted hover:text-on-surface p-1 rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="px-6 py-5 flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-on-surface-variant">Full Name *</label>
        <input id="dash-child-name" type="text" placeholder="Child's full name"
               class="w-full px-4 py-3 rounded-lg border border-border-subtle focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all text-sm"/>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium text-on-surface-variant">Date of Birth *</label>
        <input id="dash-child-dob" type="date"
               class="w-full px-4 py-3 rounded-lg border border-border-subtle focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all text-sm"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-on-surface-variant">IC Front *</label>
          <input id="dash-front-input" type="file"
                 accept=".jpg,.jpeg,.png,.heic,image/jpeg,image/png,image/heic" class="hidden"
                 onchange="dashHandleFile('front', this.files[0])"/>
          <button type="button" id="dash-front-zone" onclick="document.getElementById('dash-front-input').click()"
                  class="flex flex-col items-center justify-center gap-0.5 rounded-lg border-2 border-dashed border-border-subtle hover:border-secondary/40 p-3 min-h-[80px] text-center transition-colors w-full">
            <span class="material-symbols-outlined text-text-muted text-[24px]">upload</span>
            <span class="text-[11px] text-text-muted">Click to upload</span>
          </button>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-on-surface-variant">IC Back *</label>
          <input id="dash-back-input" type="file"
                 accept=".jpg,.jpeg,.png,.heic,image/jpeg,image/png,image/heic" class="hidden"
                 onchange="dashHandleFile('back', this.files[0])"/>
          <button type="button" id="dash-back-zone" onclick="document.getElementById('dash-back-input').click()"
                  class="flex flex-col items-center justify-center gap-0.5 rounded-lg border-2 border-dashed border-border-subtle hover:border-secondary/40 p-3 min-h-[80px] text-center transition-colors w-full">
            <span class="material-symbols-outlined text-text-muted text-[24px]">upload</span>
            <span class="text-[11px] text-text-muted">Click to upload</span>
          </button>
        </div>
      </div>
      <p class="text-xs text-text-muted -mt-1">JPG, PNG, or HEIC only · Max 5 MB per photo</p>
    </div>
    <div class="flex justify-end gap-3 px-6 pb-5">
      <button onclick="closeAddChildModal()"
              class="px-4 py-2.5 text-sm font-medium text-text-muted border border-border-subtle rounded-lg hover:bg-surface-container transition-colors">
        Cancel
      </button>
      <button id="dash-add-child-btn" onclick="submitAddChild()"
              class="px-5 py-2.5 text-sm font-bold bg-primary-container text-on-primary-fixed rounded-lg hover:brightness-105 transition-all active:scale-95 shadow-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-[16px]">person_add</span>
        Add Child
      </button>
    </div>
  </div>
</div>

<!-- ── Certificates Modal ─────────────────────────────────────────────────────── -->
<div id="certs-modal" class="hidden fixed inset-0 bg-black/40 z-[100] flex items-start justify-center p-4 pt-12 overflow-y-auto" onclick="if(event.target===this)closeCertsModal()">
  <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl mb-8">

      <h2 id="certs-modal-title" class="font-semibold text-base text-on-surface">Certificates</h2>
      <button onclick="closeCertsModal()" class="text-text-muted hover:text-on-surface p-1 rounded-lg hover:bg-surface-container transition-colors">
        <span class="material-symbols-outlined">close</span>

    </div>
    <div id="certs-modal-body" class="px-6 py-4"></div>
    <div class="flex justify-end px-6 pb-5">
      <button onclick="closeCertsModal()" class="px-4 py-2.5 text-sm font-medium text-text-muted border border-border-subtle rounded-lg hover:bg-surface-container transition-colors">Close</button>

<!-- ── In-portal File Viewer (PDF.js / image lightbox) ────────────────────────── -->
<div id="file-viewer-modal" class="hidden fixed inset-0 bg-black/90 z-[200] flex flex-col" onclick="if(event.target===this)closeFileViewer()">

      <button id="fv-next-btn" onclick="fvNav(1)" class="hidden w-9 h-9 items-center justify-center rounded-full hover:bg-white/10 text-white transition-colors">
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
      <button onclick="closeFileViewer()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 text-white transition-colors ml-1">

<footer class="py-4 text-center text-xs text-text-muted border-t border-border-subtle">
  © 2025 Cremona Music.
</footer>

<script type="module">
import { initializeApp }                              from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }       from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, setDoc, updateDoc, arrayUnion,
         collection, query, where, serverTimestamp, onSnapshot }  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject }
                                                      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app  = initializeApp({
  apiKey:            "AIzaSyB_TQF-oExYsPY4qOJtfrcDCwXbc4HV0-0",
  authDomain:        "cremonamusic-portal.firebaseapp.com",
  projectId:         "cremonamusic-portal",
  storageBucket:     "cremonamusic-portal.firebasestorage.app",
  messagingSenderId: "227259733472",
  appId:             "1:227259733472:web:3cb86ab0da1d5338858785"
});
const auth    = getAuth(app);
const db      = getFirestore(app);
const storage = getStorage(app);

// PDF.js — used only for the stripped-down in-portal certificate viewer (no annotation/editing)
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Module-level state ─────────────────────────────────────────────────────────
let currentUserId  = null;
let linkedIds      = [];
let dashFrontFile  = null;
let dashBackFile   = null;
let certsByStudent = {};   // studentId → { name, certs[] }

// Certificate type metadata (shared look across all portals)
const CERT_TYPES = { exam:'Exam Result', recital:'Recital', competition:'Competition', other:'Other' };
const CERT_BADGE = { exam:'bg-blue-50 text-blue-700', recital:'bg-purple-50 text-purple-700', competition:'bg-green-50 text-green-700', other:'bg-gray-100 text-gray-600' };

// ── helpers ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3500);
}

function avatarBg(name) {
  const colors = ['#C9A227','#7A5230','#1e6e3b','#c2410c','#6d28d9','#0369a1'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

// ── auth guard → load data ─────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/index.html'; return; }

  let parentData;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || snap.data().role !== 'parent') {
      await signOut(auth);
      window.location.href = '/index.html';
      return;
    }
    parentData = snap.data();
  } catch (e) {
    window.location.href = '/index.html';
    return;
  }

  // Greeting
  const firstName = parentData.firstName || (parentData.name || '').split(' ')[0] || '';
  if (firstName) {
    document.getElementById('greeting-name').textContent = `, ${firstName}`;
    const headerNameEl = document.getElementById('header-name');
    if (headerNameEl) headerNameEl.textContent = firstName;
  }

  // Load linked students
  currentUserId = user.uid;
  linkedIds = Array.isArray(parentData.linkedStudentIds) ? parentData.linkedStudentIds : [];
  await loadChildren(linkedIds);

  // Live announcements banner
  startAnnouncementsListener('parent');

  document.getElementById('loading-overlay').style.display = 'none';
});

// ── Announcements banner ──────────────────────────────────────────────────────
// Single array-contains filter (no composite index needed); active + ordering
// + the 2-item cap are all done client-side in the snapshot callback.
function startAnnouncementsListener(role) {
  const container = document.getElementById('announcements-banner');
  onSnapshot(
    query(collection(db, 'announcements'), where('audience', 'array-contains', role)),
    snap => {
      const anns = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(a => a.active)
        .sort((a, b) => (a.order ?? 0) - (b.order ?? 0))
        .slice(0, 2);

      if (!anns.length) {
        container.innerHTML = '';
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      container.innerHTML = anns.map(buildAnnouncementCardHtml).join('');
    },
    err => console.error('[announcements listener]', err)
  );
}

// Renders one announcement card. Kept byte-identical across home.html,
// parent/dashboard.html, and the admin live preview so the admin's preview
// always matches what users actually see.
function buildAnnouncementCardHtml(a) {
  const bg       = a.bgColor   || '#F5E5B0';
  const text     = a.textColor || '#3E2C23';
  const hasPhoto = !!a.photoUrl;
  const position = a.photoPosition || 'left';    // left | right | top | center | background
  const fit      = a.photoFit      || 'cover';   // cover | contain | original
  const size     = (a.photoSize    != null) ? a.photoSize    : 100;  // 10-100 (%)
  const radius   = (a.photoRadius  != null) ? a.photoRadius  : 8;    // 0-50 (% border-radius)
  const opacity  = (a.photoOpacity != null) ? a.photoOpacity : 100;  // 0-100 (%)

  const objectFit  = fit === 'original' ? '' : `object-fit:${fit};`;
  const radiusPct  = `border-radius:${radius}%;`;
  const opacityDec = Math.max(0, Math.min(100, opacity)) / 100;

  const textHtml = `
    ${a.title ? `<p class="font-bold text-base mb-1">${escHtml(a.title)}</p>` : ''}
    <p class="text-sm leading-relaxed whitespace-pre-wrap">${escHtml(a.body || '')}</p>
    ${a.linkUrl ? `<a href="${escHtml(a.linkUrl)}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 mt-3 text-sm font-semibold underline">${escHtml(a.linkLabel || 'Learn more')} →</a>` : ''}`;

  if (hasPhoto && position === 'background') {
    return `
    <div class="relative overflow-hidden" style="background:${bg};color:${text};min-height:140px;${radiusPct}">
      <img src="${escHtml(a.photoUrl)}" class="absolute inset-0 w-full h-full" style="${objectFit}opacity:${opacityDec};"/>
      <div class="relative z-10 p-5">${textHtml}</div>
    </div>`;
  }

  const leftRightPx = Math.round(60 + (size / 100) * 180);   // 60–240px
  const topCenterPx = Math.round(80 + (size / 100) * 220);   // 80–300px

  let photoHtml = '';
  if (hasPhoto) {
    if (position === 'left' || position === 'right') {
      const h = fit === 'original' ? 'height:auto;' : `height:${leftRightPx}px;`;
      photoHtml = `<img src="${escHtml(a.photoUrl)}" class="flex-shrink-0" style="width:${leftRightPx}px;${h}${objectFit}opacity:${opacityDec};${radiusPct}"/>`;
    } else if (position === 'top') {
      const h = fit === 'original' ? 'height:auto;' : `height:${topCenterPx}px;`;
      photoHtml = `<img src="${escHtml(a.photoUrl)}" style="width:100%;${h}${objectFit}opacity:${opacityDec};${radiusPct}"/>`;
    } else { // center
      const h = fit === 'original' ? 'height:auto;' : `height:${topCenterPx}px;`;
      photoHtml = `<img src="${escHtml(a.photoUrl)}" style="width:${size}%;margin:0 auto;${h}${objectFit}opacity:${opacityDec};${radiusPct}"/>`;
    }
  }

  const dirClass =
    position === 'right'  ? 'flex flex-col sm:flex-row-reverse gap-4 items-start' :
    position === 'top'    ? 'flex flex-col gap-4' :
    position === 'center' ? 'flex flex-col items-center text-center gap-4' :
                             'flex flex-col sm:flex-row gap-4 items-start'; // left / no photo

  return `
  <div class="rounded-2xl p-5 ${dirClass}" style="background:${bg};color:${text}">
    ${photoHtml}
    <div class="flex-1 min-w-0${position === 'center' ? ' w-full' : ''}">${textHtml}</div>
  </div>`;
}

async function loadChildren(ids) {
  const grid = document.getElementById('children-grid');

  if (!ids.length) {
    grid.innerHTML = `
      <div class="col-span-full flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <span class="material-symbols-outlined text-5xl opacity-30">child_care</span>
        <p class="font-semibold text-sm">No children linked yet</p>
        <p class="text-xs mb-2">Register a child to get started, or ask your administrator to link your account.</p>
        <button onclick="openAddChildModal()"
                class="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-primary-container text-on-primary-fixed text-sm font-bold hover:brightness-105 active:scale-95 transition-all shadow-sm">
          <span class="material-symbols-outlined text-[16px]">add_circle</span>
          Add a Child
        </button>
      </div>`;
    return;
  }

  let students = [];
  try {
    const snaps = await Promise.all(ids.map(id => getDoc(doc(db, 'students', id))));
    students = snaps.filter(s => s.exists()).map(s => ({ id: s.id, ...s.data() }));
  } catch (e) {
    showToast('Failed to load student data.', 'error');
    return;
  }

  if (!students.length) {
    grid.innerHTML = `
      <div class="col-span-full flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <span class="material-symbols-outlined text-5xl opacity-30">person_off</span>
        <p class="font-semibold text-sm">No student records found</p>
      </div>`;
    return;
  }

  // Fetch teacher names for all assigned teachers across all students
  const teacherMap = {};
  const allTeacherUids = [...new Set(students.flatMap(s => s.assignedTeachers || []))];
  if (allTeacherUids.length) {
    try {
      const tSnaps = await Promise.all(allTeacherUids.map(uid => getDoc(doc(db, 'users', uid))));
      tSnaps.forEach(snap => { if (snap.exists()) teacherMap[snap.id] = snap.data(); });
    } catch (_) { /* non-fatal — teacher names just won't show */ }
  }

  grid.innerHTML = students.map((s, idx) => {
    const name     = s.fullName || '—';
    const grade    = s.grade   || '';
    const initials = name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
    const bg       = avatarBg(name);
    const teachers = (s.assignedTeachers || [])
      .map(uid => teacherMap[uid]?.name || teacherMap[uid]?.email)
      .filter(Boolean);
    const sid = encodeURIComponent(s.id);
    return `
      <div class="child-card fade-up bg-surface-white rounded-2xl border border-border-subtle p-6 flex flex-col items-center gap-4"
           style="animation-delay:${idx * 60}ms">
        <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold flex-shrink-0"
             style="background:${bg}">
          ${escHtml(initials)}
        </div>
        <div class="text-center flex-1">
          <p class="font-semibold text-on-surface text-base">${escHtml(name)}</p>
          ${grade ? `<p class="text-sm text-text-muted mt-0.5">${escHtml(grade)}</p>` : ''}
          ${teachers.length ? `<p class="text-xs text-text-muted mt-1 flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-[13px]">person</span>${escHtml(teachers.join(', '))}</p>` : ''}
        </div>
        <div class="flex flex-col gap-2 w-full">
          <div class="flex gap-2 w-full">
            <a href="schedule.html?studentId=${sid}"
               class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border border-border-subtle text-xs font-semibold text-text-muted hover:bg-surface-container hover:text-on-surface transition-colors no-underline">
              <span class="material-symbols-outlined text-[14px]">calendar_month</span>Schedule
            </a>
            <a href="comments.html?studentId=${sid}"
               class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg bg-secondary/10 text-xs font-semibold text-secondary hover:bg-secondary/20 transition-colors no-underline">
              <span class="material-symbols-outlined text-[14px]">chat</span>Comments
            </a>
          </div>
          <button onclick="openCertsModal('${escHtml(s.id)}')"
             class="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg border border-border-subtle text-xs font-semibold text-text-muted hover:bg-surface-container hover:text-on-surface transition-colors">
            <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1;">workspace_premium</span>Certificates
            <span id="cert-count-${escHtml(s.id)}" class="ml-0.5 px-1.5 py-0.5 rounded-full bg-secondary/15 text-secondary text-[10px] font-bold hidden">0</span>
          </button>
        </div>
      </div>`;
  }).join('');

  // Fetch certificate counts per child, update badges, and cache for the modal
  certsByStudent = {};
  await Promise.all(students.map(async st => {
    try {
      const snap = await getDocs(query(collection(db, 'certificates'), where('studentId', '==', st.id)));
      const certs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.issuedDate || '').localeCompare(a.issuedDate || ''));
      certsByStudent[st.id] = { name: st.fullName || 'Child', certs };
      const badge = document.getElementById('cert-count-' + st.id);
      if (badge && certs.length) { badge.textContent = certs.length; badge.classList.remove('hidden'); }
    } catch (_) { /* non-fatal */ }
  }));
}

// ── Certificates modal ─────────────────────────────────────────────────────────
// Returns a certificate's files as an array, regardless of schema version —
// new docs store `files: [{fileUrl,fileName}]`; legacy docs store a single
// top-level `fileUrl`/`fileName` pair (treated as a one-item array).
function getCertFiles(c) {
  if (Array.isArray(c.files) && c.files.length) return c.files;
  if (c.fileUrl) return [{ fileUrl: c.fileUrl, fileName: c.fileName || 'Certificate' }];
  return [];
}

let modalCertsCache = [];

window.openCertsModal = function(sid) {
  const entry = certsByStudent[sid] || { name: 'Child', certs: [] };
  modalCertsCache = entry.certs;
  document.getElementById('certs-modal-title').textContent = `${entry.name} — Certificates`;
  const body = document.getElementById('certs-modal-body');
  if (!entry.certs.length) {
    body.innerHTML = `<div class="flex flex-col items-center justify-center py-10 text-center text-text-muted gap-2">
      <span class="material-symbols-outlined text-4xl opacity-30">workspace_premium</span>
      <p class="text-sm font-semibold">No certificates yet</p>
      <p class="text-xs">Certificates awarded to your child will appear here.</p>
    </div>`;
  } else {
    body.innerHTML = entry.certs.map(certRowHtml).join('');
    body.querySelectorAll('[data-view-cert]').forEach(b =>
      b.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        const c = modalCertsCache.find(x => x.id === b.dataset.viewCert);
        if (c) openFileViewer(getCertFiles(c), 0);
      }));
  }
  document.getElementById('certs-modal').classList.remove('hidden');
};
window.closeCertsModal = function() { document.getElementById('certs-modal').classList.add('hidden'); };

function certRowHtml(c) {
  const label = CERT_TYPES[c.type] || 'Other';
  const badge = CERT_BADGE[c.type] || CERT_BADGE.other;
  const files = getCertFiles(c);
  const viewLabel = files.length > 1 ? `View (${files.length})` : 'View';
  return `
  <div class="flex items-center gap-3 py-3 border-t border-border-subtle first:border-t-0">
    <span class="material-symbols-outlined text-secondary flex-shrink-0" style="font-variation-settings:'FILL' 1;">workspace_premium</span>
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-on-surface truncate">${escHtml(c.title || 'Certificate')}</p>
      <div class="flex items-center gap-2 mt-0.5 flex-wrap">
        <span class="px-2 py-0.5 rounded-full text-[11px] font-semibold ${badge}">${label}</span>
        <span class="text-xs text-text-muted">${escHtml(fmtDate(c.issuedDate))}</span>
      </div>
      ${c.notes ? `<p class="text-xs text-text-muted mt-1">${escHtml(c.notes)}</p>` : ''}
    </div>
    <button type="button" data-view-cert="${escHtml(c.id)}" class="flex items-center gap-1 px-3 py-1.5 rounded-lg border border-border-subtle text-xs font-semibold text-text-muted hover:text-secondary hover:border-secondary transition-colors flex-shrink-0">
      <span class="material-symbols-outlined text-[16px]">visibility</span> ${viewLabel}
    </button>
  </div>`;
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return isNaN(d) ? str : d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

// ── In-portal file viewer (PDF.js render / image lightbox) ────────────────────
let fvFiles = [];
let fvIndex = 0;

window.openFileViewer = function(files, startIndex) {
  fvFiles = files || [];
  fvIndex = startIndex || 0;
  if (!fvFiles.length) { showToast('No files to display.', 'error'); return; }
  document.getElementById('file-viewer-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  renderViewerFile();
};

window.closeFileViewer = function() {
  document.getElementById('file-viewer-modal').classList.add('hidden');
  document.getElementById('fv-body').innerHTML = '';
  document.body.style.overflow = '';
};

window.fvNav = function(dir) {
  fvIndex = (fvIndex + dir + fvFiles.length) % fvFiles.length;
  renderViewerFile();
};

function renderViewerFile() {
  const f = fvFiles[fvIndex];
  document.getElementById('fv-filename').textContent = f.fileName || 'File';
  const multi = fvFiles.length > 1;
  document.getElementById('fv-prev-btn').classList.toggle('hidden', !multi);
  document.getElementById('fv-next-btn').classList.toggle('hidden', !multi);
  const counter = document.getElementById('fv-counter');
  counter.classList.toggle('hidden', !multi);
  if (multi) counter.textContent = `${fvIndex + 1} / ${fvFiles.length}`;

  const body = document.getElementById('fv-body');
  const isPdf = /\.pdf($|\?)/i.test(f.fileName || f.fileUrl || '');
  if (isPdf) {
    body.innerHTML = `<div id="fv-pdf-pages" class="flex flex-col items-center gap-4 py-4 w-full max-w-3xl mx-auto"></div>`;
    renderPdfInViewer(f.fileUrl);
  } else {
    body.innerHTML = `<img src="${escHtml(f.fileUrl)}" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl" alt="${escHtml(f.fileName || '')}"/>`;
  }
}

async function renderPdfInViewer(url) {
  const container = document.getElementById('fv-pdf-pages');
  container.innerHTML = `<div class="flex items-center gap-3 text-white/70 text-sm py-10">
    <span class="spinner" style="border-color:rgba(255,255,255,.2);border-top-color:#fff;"></span> Loading PDF…</div>`;
  try {
    const task   = pdfjsLib.getDocument({ url, withCredentials: false });
    const pdfDoc = await task.promise;
    container.innerHTML = '';
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page     = await pdfDoc.getPage(i);
      const unscaled = page.getViewport({ scale: 1 });
      const targetW  = Math.min(container.clientWidth || 760, 760);
      const viewport = page.getViewport({ scale: targetW / unscaled.width });
      const dpr      = window.devicePixelRatio || 1;
      const canvas   = document.createElement('canvas');
      canvas.className = 'rounded-lg shadow-2xl bg-white';
      canvas.width  = Math.floor(viewport.width * dpr);
      canvas.height = Math.floor(viewport.height * dpr);
      canvas.style.width  = Math.floor(viewport.width) + 'px';
      canvas.style.height = Math.floor(viewport.height) + 'px';
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      await page.render({ canvasContext: ctx, viewport }).promise;
      container.appendChild(canvas);
    }
  } catch (e) {
    console.error('[renderPdfInViewer]', e);
    container.innerHTML = `<p class="text-white/70 text-sm py-10">Failed to load PDF preview.</p>`;
  }
}

// ── Add Child modal ────────────────────────────────────────────────────────────
window.openAddChildModal = function() {
  dashFrontFile = null;
  dashBackFile  = null;
  document.getElementById('dash-child-name').value = '';
  document.getElementById('dash-child-dob').value  = '';
  document.getElementById('dash-front-input').value = '';
  document.getElementById('dash-back-input').value  = '';
  resetDashZone('front');
  resetDashZone('back');
  document.getElementById('add-child-modal').classList.remove('hidden');
  document.getElementById('dash-child-name').focus();
};

window.closeAddChildModal = function() {
  document.getElementById('add-child-modal').classList.add('hidden');
};

function resetDashZone(side) {
  const zone = document.getElementById(`dash-${side}-zone`);
  zone.innerHTML = `
    <span class="material-symbols-outlined text-text-muted text-[24px]">upload</span>
    <span class="text-[11px] text-text-muted">Click to upload</span>`;
  zone.className = zone.className
    .replace('border-secondary bg-secondary/5', '')
    + ' border-dashed border-border-subtle';
}

window.dashHandleFile = function(side, file) {
  if (!file) return;
  const ALLOWED = ['image/jpeg', 'image/png', 'image/heic', 'image/heif'];
  if (!ALLOWED.includes(file.type) && !file.name.toLowerCase().match(/\.(jpg|jpeg|png|heic)$/)) {
    showToast('Only JPG, PNG, or HEIC files are allowed.', 'error'); return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showToast('Image must be under 5 MB.', 'error'); return;
  }
  if (side === 'front') dashFrontFile = file;
  else                  dashBackFile  = file;

  const zone = document.getElementById(`dash-${side}-zone`);
  zone.innerHTML = `
    <span class="material-symbols-outlined text-[20px]" style="color:#C9A227;font-variation-settings:'FILL' 1;">check_circle</span>
    <span class="text-[11px] font-medium mt-0.5 block truncate max-w-full px-1" style="color:#C9A227;">${escHtml(file.name)}</span>`;
  zone.classList.remove('border-dashed', 'border-border-subtle');
  zone.classList.add('border-secondary', 'bg-secondary/5');
};

window.submitAddChild = async function() {
  const name = document.getElementById('dash-child-name').value.trim();
  const dob  = document.getElementById('dash-child-dob').value;
  if (!name)          { showToast('Full name is required.', 'error'); return; }
  if (!dob)           { showToast('Date of birth is required.', 'error'); return; }
  if (!dashFrontFile) { showToast('IC Front photo is required.', 'error'); return; }
  if (!dashBackFile)  { showToast('IC Back photo is required.', 'error'); return; }

  const btn = document.getElementById('dash-add-child-btn');
  const resetBtn = () => {
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined text-[16px]">person_add</span> Add Child';
  };
  const spinner = '<div style="width:18px;height:18px;border:2px solid rgba(62,44,35,.25);border-top-color:#3E2C23;border-radius:50%;animation:spin .7s linear infinite;display:inline-block"></div>';
  btn.disabled = true;

  // Pre-generate student doc ref — ID reserved, no Firestore write yet
  const ext        = f => f.name.toLowerCase().endsWith('.heic') ? 'heic'
                        : f.name.toLowerCase().endsWith('.png')  ? 'png' : 'jpg';
  const studentRef = doc(collection(db, 'students'));
  const sid        = studentRef.id;
  const frontRef   = sRef(storage, `studentIC/${sid}/front.${ext(dashFrontFile)}`);
  const backRef    = sRef(storage, `studentIC/${sid}/back.${ext(dashBackFile)}`);

  // ── Step 1: Upload both photos first ──────────────────────────────────────
  btn.innerHTML = `${spinner} Uploading photos…`;
  let icFrontUrl, icBackUrl;
  try {
    await Promise.all([
      uploadBytes(frontRef, dashFrontFile, { contentType: dashFrontFile.type || 'image/jpeg' }),
      uploadBytes(backRef,  dashBackFile,  { contentType: dashBackFile.type  || 'image/jpeg' }),
    ]);
    [icFrontUrl, icBackUrl] = await Promise.all([
      getDownloadURL(frontRef),
      getDownloadURL(backRef),
    ]);
  } catch (e) {
    console.error('[submitAddChild] photo upload failed', e);
    // Rollback: delete any partial uploads (best-effort)
    await Promise.allSettled([
      deleteObject(frontRef).catch(() => {}),
      deleteObject(backRef).catch(() => {}),
    ]);
    showToast('Photo upload failed. Please try again.', 'error');
    resetBtn(); return;
  }

  // ── Step 2: Create student doc with URLs embedded from the start ───────────
  btn.innerHTML = `${spinner} Saving record…`;
  try {
    await setDoc(studentRef, {
      fullName: name, dateOfBirth: dob,
      grade: '', notes: '', assignedTeachers: [],
      createdAt: serverTimestamp(),
      registeredViaParentSignup: true,
      icFrontUrl, icBackUrl,
    });
  } catch (e) {
    console.error('[submitAddChild] student doc creation failed', e);
    // Rollback: delete uploaded photos since doc was never created
    await Promise.allSettled([
      deleteObject(frontRef).catch(() => {}),
      deleteObject(backRef).catch(() => {}),
    ]);
    showToast('Failed to save student record. Please try again.', 'error');
    resetBtn(); return;
  }

  // ── Step 3: Link student to parent ────────────────────────────────────────
  // Student doc exists and is complete — linking failure is non-fatal; admin can fix
  btn.innerHTML = `${spinner} Linking…`;
  try {
    await updateDoc(doc(db, 'users', currentUserId), {
      linkedStudentIds: arrayUnion(sid),
    });
  } catch (e) {
    console.error('[submitAddChild] linkedStudentIds update failed', e);
    showToast('Child saved but account link failed — please contact support.', 'error');
    resetBtn(); return;
  }

  linkedIds = [...linkedIds, sid];
  closeAddChildModal();
  showToast('Child added successfully!', 'success');
  await loadChildren(linkedIds);
  resetBtn();
};

window.doSignOut = async function() {
  await signOut(auth);
  window.location.href = '/index.html';
};
