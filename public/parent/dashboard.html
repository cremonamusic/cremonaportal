<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard | I TALK Parent Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#785900", "primary-container": "#ffc107",
          "on-primary-fixed": "#261a00", "on-primary-container": "#6d5100",
          "secondary": "#0058bb", "secondary-fixed": "#d8e2ff",
          "surface": "#f8f9fa", "surface-white": "#FFFFFF",
          "surface-container": "#edeeef", "surface-container-low": "#f3f4f5",
          "on-surface": "#191c1d", "on-surface-variant": "#4f4632",
          "border-subtle": "#E0E0E0", "text-muted": "#5F6368",
          "error": "#ba1a1a"
        },
        fontFamily: { sans: ["Inter", "sans-serif"] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(120,89,0,0.15); border-top-color: #785900; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.35s ease-out both; }
  .child-card { transition: box-shadow 0.15s ease, transform 0.15s ease; }
  .child-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.10); transform: translateY(-2px); }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity:1; }
  #toast.error   { background:#ba1a1a; color:#fff; }
  #toast.success { background:#1e6e3b; color:#fff; }
  #toast.info    { background:#0058bb; color:#fff; }
</style>
</head>
<body class="text-on-surface min-h-screen flex flex-col">

<!-- Loading overlay -->
<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">
    <div class="spinner"></div>
    <p class="text-text-muted text-sm">Loading...</p>
  </div>
</div>

<div id="toast"></div>

<!-- Header -->
<header class="bg-surface-white border-b border-border-subtle shadow-sm sticky top-0 z-50">
  <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
    <div class="flex items-center gap-6">
      <img src="/logo.png" alt="I TALK" class="h-8 w-auto rounded-lg"/>
      <nav class="hidden sm:flex items-center gap-5">
        <a href="dashboard.html" class="text-sm font-bold text-secondary border-b-2 border-secondary pb-0.5">Dashboard</a>
        <a href="schedule.html"  class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Schedule</a>
        <a href="reports.html"   class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Reports</a>
        <a href="messages.html"  class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Messages</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <span id="header-name" class="hidden sm:block text-sm text-text-muted font-medium"></span>
      <button onclick="doSignOut()"
              class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium text-text-muted hover:bg-surface-container hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined text-[18px]">logout</span>
        <span class="hidden sm:inline">Sign Out</span>
      </button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="flex-1 max-w-4xl mx-auto w-full px-6 py-8">

  <!-- Greeting -->
  <div class="mb-8 fade-up">
    <h1 class="text-2xl font-bold text-on-surface">Welcome back<span id="greeting-name"></span></h1>
    <p class="text-text-muted mt-1 text-sm">Here's an overview of your child's progress.</p>
  </div>

  <!-- Children section -->
  <section>
    <h2 class="text-sm font-semibold text-text-muted uppercase tracking-wide mb-4">Your Children</h2>
    <div id="children-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- populated by JS -->
    </div>
  </section>

</main>

<footer class="py-4 text-center text-xs text-text-muted border-t border-border-subtle">
  © 2024 I TALK.
</footer>

<script type="module">
import { initializeApp }                              from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }       from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, where }
                                                      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app  = initializeApp({
  apiKey:            "AIzaSyAPfuUfjwVpewn1YVjm1D_mAsu-DLEHLa8",
  authDomain:        "italk-teachers.firebaseapp.com",
  projectId:         "italk-teachers",
  storageBucket:     "italk-teachers.firebasestorage.app",
  messagingSenderId: "566278333053",
  appId:             "1:566278333053:web:bcd0a14138d18b572b0714"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── helpers ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3500);
}

function avatarBg(name) {
  const colors = ['#785900','#0058bb','#1e6e3b','#c2410c','#6d28d9','#0369a1'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

// ── auth guard → load data ─────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/index.html'; return; }

  let parentData;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || snap.data().role !== 'parent') {
      await signOut(auth);
      window.location.href = '/index.html';
      return;
    }
    parentData = snap.data();
  } catch (e) {
    window.location.href = '/index.html';
    return;
  }

  // Greeting
  const firstName = parentData.firstName || (parentData.name || '').split(' ')[0] || '';
  if (firstName) {
    document.getElementById('greeting-name').textContent = `, ${firstName}`;
    document.getElementById('header-name').textContent   = firstName;
  }

  // Load linked students
  const linkedIds = Array.isArray(parentData.linkedStudentIds) ? parentData.linkedStudentIds : [];
  await loadChildren(linkedIds);

  document.getElementById('loading-overlay').style.display = 'none';
});

async function loadChildren(ids) {
  const grid = document.getElementById('children-grid');

  if (!ids.length) {
    grid.innerHTML = `
      <div class="col-span-full flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <span class="material-symbols-outlined text-5xl opacity-30">child_care</span>
        <p class="font-semibold text-sm">No children linked yet</p>
        <p class="text-xs">Ask your administrator to link your account to a student.</p>
      </div>`;
    return;
  }

  let students = [];
  try {
    const snaps = await Promise.all(ids.map(id => getDoc(doc(db, 'students', id))));
    students = snaps.filter(s => s.exists()).map(s => ({ id: s.id, ...s.data() }));
  } catch (e) {
    showToast('Failed to load student data.', 'error');
    return;
  }

  if (!students.length) {
    grid.innerHTML = `
      <div class="col-span-full flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <span class="material-symbols-outlined text-5xl opacity-30">person_off</span>
        <p class="font-semibold text-sm">No student records found</p>
      </div>`;
    return;
  }

  // Fetch teacher names for all assigned teachers across all students
  const teacherMap = {};
  const allTeacherUids = [...new Set(students.flatMap(s => s.assignedTeachers || []))];
  if (allTeacherUids.length) {
    try {
      const tSnaps = await Promise.all(allTeacherUids.map(uid => getDoc(doc(db, 'users', uid))));
      tSnaps.forEach(snap => { if (snap.exists()) teacherMap[snap.id] = snap.data(); });
    } catch (_) { /* non-fatal — teacher names just won't show */ }
  }

  grid.innerHTML = students.map((s, idx) => {
    const name     = s.fullName || '—';
    const grade    = s.grade   || '';
    const initials = name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
    const bg       = avatarBg(name);
    const teachers = (s.assignedTeachers || [])
      .map(uid => teacherMap[uid]?.name || teacherMap[uid]?.email)
      .filter(Boolean);
    const sid = encodeURIComponent(s.id);
    return `
      <div class="child-card fade-up bg-surface-white rounded-2xl border border-border-subtle p-6 flex flex-col items-center gap-4"
           style="animation-delay:${idx * 60}ms">
        <div class="w-16 h-16 rounded-full flex items-center justify-center text-white text-xl font-bold flex-shrink-0"
             style="background:${bg}">
          ${escHtml(initials)}
        </div>
        <div class="text-center flex-1">
          <p class="font-semibold text-on-surface text-base">${escHtml(name)}</p>
          ${grade ? `<p class="text-sm text-text-muted mt-0.5">${escHtml(grade)}</p>` : ''}
          ${teachers.length ? `<p class="text-xs text-text-muted mt-1 flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-[13px]">person</span>${escHtml(teachers.join(', '))}</p>` : ''}
        </div>
        <div class="flex gap-2 w-full">
          <a href="schedule.html?studentId=${sid}"
             class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg border border-border-subtle text-xs font-semibold text-text-muted hover:bg-surface-container hover:text-on-surface transition-colors no-underline">
            <span class="material-symbols-outlined text-[14px]">calendar_month</span>Schedule
          </a>
          <a href="reports.html?studentId=${sid}"
             class="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg bg-secondary/10 text-xs font-semibold text-secondary hover:bg-secondary/20 transition-colors no-underline">
            <span class="material-symbols-outlined text-[14px]">description</span>Reports
          </a>
        </div>
      </div>`;
  }).join('');
}

window.doSignOut = async function() {
  await signOut(auth);
  window.location.href = '/index.html';
};
</script>
</body>
</html>
