<style>
  body { font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }

</style>

<body class="bg-background text-on-surface flex flex-col" data-portal="parent" data-page="messages">

<script>
window.CREMONA_LANG = localStorage.getItem('cremona-lang') || 'en';
window.toggleLang = function() {
  window.CREMONA_LANG = window.CREMONA_LANG === 'en' ? 'ko' : 'en';
  localStorage.setItem('cremona-lang', window.CREMONA_LANG);
  localStorage.setItem('cremona-lang-explicit', '1');
  if (window._i18nApply) window._i18nApply();
  if (window._rerender)  window._rerender();
  if (window._syncLang)  window._syncLang(window.CREMONA_LANG);
};
</script>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, collection, query, where,
  onSnapshot, addDoc, updateDoc, deleteDoc, getDocs, writeBatch,
  serverTimestamp, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const WORKER_URL     = 'https://cremona-upload-worker.garam-9b9.workers.dev';
const R2_PUBLIC_BASE = 'https://files.cremonamusic.com';

const app  = initializeApp({
  apiKey: "REPLACE_ME_CREMONA_API_KEY",
  authDomain: "portal.cremonamusic.com",
  projectId: "cremona-portal",
  storageBucket: "cremona-portal.firebasestorage.app",
  messagingSenderId: "REPLACE_ME_SENDER_ID",
  appId: "REPLACE_ME_APP_ID"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── i18n ──────────────────────────────────────────────────────────────────────
const TRANS = {
  en: {
    nav_dashboard:'Dashboard', nav_schedule:'Schedule', nav_reports:'Comments',
    nav_messages:'Messages', nav_payments:'Payments', nav_signout:'Sign Out',
    msg_search_ph:'Search conversations…',
    msg_announcements:'Announcements',
    msg_direct:'Direct Messages',
    msg_no_ann:'No announcements',
    msg_no_dm:'No direct messages',
    msg_select:'Select a conversation',
    msg_readonly:'Read only — only admins can post in announcements',
    msg_type_ph:'Type a message…',
    msg_no_msgs:'No messages yet.',
    msg_ann_channel:'Announcements channel',
    msg_online:'Online', msg_offline:'Offline',
    msg_direct_msg:'Direct Message',
    msg_new_chat:'Message a teacher',
    msg_new_chat_title:'Message a Teacher',
    msg_new_chat_ph:'Search teachers…',
    msg_delete_chat:'Delete chat',
    msg_read:'Read', msg_unread:'Unread',
    msg_translate:'Translate', msg_show_original:'Show original',
    msg_support:'Support', msg_contact_support:'Contact Support',
    msg_support_name:'Cremona Support',
    msg_support_sub:'Ask the Cremona Music team anything — we usually reply within a day',
  },
  ko: {
    nav_dashboard:'대시보드', nav_schedule:'일정', nav_reports:'보고서',
    nav_messages:'메시지', nav_payments:'결제', nav_signout:'로그아웃',
    msg_search_ph:'대화 검색…',
    msg_announcements:'공지사항',
    msg_direct:'다이렉트 메시지',
    msg_no_ann:'공지사항이 없습니다',
    msg_no_dm:'다이렉트 메시지가 없습니다',
    msg_select:'대화를 선택하세요',
    msg_readonly:'읽기 전용 — 공지사항은 관리자만 게시할 수 있습니다',
    msg_type_ph:'메시지를 입력하세요…',
    msg_no_msgs:'아직 메시지가 없습니다.',
    msg_ann_channel:'공지사항 채널',
    msg_online:'온라인', msg_offline:'오프라인',
    msg_direct_msg:'다이렉트 메시지',
    msg_new_chat:'선생님에게 메시지',
    msg_new_chat_title:'선생님에게 메시지',
    msg_new_chat_ph:'선생님 검색…',
    msg_delete_chat:'대화 삭제',
    msg_read:'읽음', msg_unread:'안 읽음',
    msg_translate:'번역', msg_show_original:'원문 보기',
    msg_support:'문의', msg_contact_support:'문의하기',
    msg_support_name:'Cremona Music 고객지원',
    msg_support_sub:'궁금한 점을 남겨 주세요 — 보통 하루 안에 답변드립니다',
  }
};

function t(key) {
  return TRANS[window.CREMONA_LANG || 'en']?.[key] || TRANS.en[key] || key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t(el.dataset.i18nPh); });
  document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.dataset.i18nTitle); });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = (window.CREMONA_LANG === 'en') ? '한국어' : 'English';
  document.documentElement.lang = window.CREMONA_LANG || 'en';
}

window._i18nApply = applyTranslations;

window._rerender = function() {
  renderSidebar();
  renderMessages();
  applyTranslations();
};

// ── State ─────────────────────────────────────────────────────────────────────
let currentUser     = null;
let currentUserData = null;
let conversations   = new Map();
let activeConvId    = null;
let msgArr          = [];
let allUsers        = new Map();
let presenceMap     = new Map();
let convUnsub           = null;
let msgUnsub            = null;
let pendingFile         = null;
let sidebarFilter       = '';
let dmDisplayNames      = new Map();
let readTimes           = new Map();
let translatedMsgIds    = new Set();  // message ids currently shown translated
let presenceIntervalId  = null;
let pollIntervalId      = null;
let visibilityHandler   = null;

function teardown() {
  if (convUnsub)          { convUnsub(); convUnsub = null; }
  if (msgUnsub)           { msgUnsub();  msgUnsub  = null; }
  if (presenceIntervalId) { clearInterval(presenceIntervalId); presenceIntervalId = null; }
  if (pollIntervalId)     { clearInterval(pollIntervalId);     pollIntervalId     = null; }
  if (visibilityHandler)  { document.removeEventListener('visibilitychange', visibilityHandler); visibilityHandler = null; }

  conversations.clear(); allUsers.clear(); presenceMap.clear();
  dmDisplayNames.clear(); readTimes.clear(); translatedMsgIds.clear();
  activeConvId  = null; msgArr = []; pendingFile = null; sidebarFilter = '';
  clearFile();

  const emptyState = document.getElementById('empty-state');
  const convView   = document.getElementById('conv-view');
  if (emptyState) emptyState.style.display = '';
  if (convView)   convView.style.display   = 'none';
  ['sidebar-announcements', 'sidebar-dms'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/'; return; }
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || snap.data().status === 'inactive') {
      await signOut(auth); window.location.href = '/'; return;
    }
    const data = snap.data();
    if (data.role !== 'parent') { window.location.href = '/'; return; }

    teardown();
    currentUser     = user;
    currentUserData = { uid: user.uid, ...data };

    const fsLang = data.preferredLanguage;
    // Only adopt the stored (app) preference when this browser has no explicit
    // choice. Otherwise a toggle whose fire-and-forget write hasn't landed yet
    // would get clobbered back on the next page load.
    const langExplicit = localStorage.getItem('cremona-lang-explicit') === '1';
    if ((fsLang === 'en' || fsLang === 'ko') && fsLang !== window.CREMONA_LANG && !langExplicit) {
      window.CREMONA_LANG = fsLang;
      localStorage.setItem('cremona-lang', fsLang);
    } else if (langExplicit && fsLang !== window.CREMONA_LANG) {
      updateDoc(doc(db, 'users', user.uid), { preferredLanguage: window.CREMONA_LANG }).catch(() => {});
    }
    window._syncLang = (lang) => {
      updateDoc(doc(db, 'users', user.uid), { preferredLanguage: lang }).catch(() => {});
    };

    await init();
    applyTranslations();
    document.getElementById('loading-overlay').style.display = 'none';
  } catch (e) {
    console.error('auth error', e);
    window.location.href = '/';
  }
});

window.doSignOut = async function() {
  teardown();
  await signOut(auth);
  window.location.href = '/';
};

async function init() {
  const displayName = (currentUserData.firstName && currentUserData.lastName)
    ? `${currentUserData.firstName} ${currentUserData.lastName}`
    : (currentUserData.name || '');
  document.getElementById('header-name').textContent = displayName;

  await updateOwnPresence(true);
  presenceIntervalId = setInterval(() => updateOwnPresence(true), 60000);
  visibilityHandler  = () => updateOwnPresence(!document.hidden);
  document.addEventListener('visibilitychange', visibilityHandler);

  await loadAllUsers();
  await pollPresence();
  pollIntervalId = setInterval(pollPresence, 30000);
  startConversationListener();
}

async function updateOwnPresence(online) {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, 'userPresence', currentUser.uid),
      { online, lastSeen: serverTimestamp() }, { merge: true });
  } catch (_) {}
}

async function pollPresence() {
  if (!conversations.size) return;
  try {
    const uids = new Set();
    conversations.forEach(c => (c.members || []).forEach(u => {
      if (u !== currentUser.uid) uids.add(u);
    }));
    await Promise.all([...uids].map(async uid => {
      const s = await getDoc(doc(db, 'userPresence', uid));
      if (s.exists()) presenceMap.set(uid, s.data());
    }));
    renderSidebar();
  } catch (_) {}
}

function isOnline(uid) {
  const p = presenceMap.get(uid);
  if (!p) return false;
  if (p.online === false) return false;
  const ls = p.lastSeen?.toDate ? p.lastSeen.toDate() : null;
  return ls ? (Date.now() - ls.getTime()) < 2 * 60 * 1000 : false;
}

async function loadAllUsers() {
  try {
    const snap = await getDocs(collection(db, 'users'));
    snap.forEach(d => allUsers.set(d.id, { uid: d.id, ...d.data() }));
  } catch (e) { console.error('loadAllUsers', e); }
}

function startConversationListener() {
  if (convUnsub) { convUnsub(); convUnsub = null; }
  const q = query(
    collection(db, 'conversations'),
    where('members', 'array-contains', currentUser.uid)
  );
  convUnsub = onSnapshot(q, async snap => {
    snap.docChanges().forEach(change => {
      if (change.type === 'removed') conversations.delete(change.doc.id);
      else conversations.set(change.doc.id, { id: change.doc.id, ...change.doc.data() });
    });

    const missing = new Set();
    conversations.forEach(conv => {
      if (conv.type === 'direct') {
        (conv.members || []).forEach(uid => {
          if (uid !== currentUser.uid && !allUsers.has(uid)) missing.add(uid);
        });
      }
    });
    if (missing.size > 0) {
      await Promise.all([...missing].map(async uid => {
        try {
          const s = await getDoc(doc(db, 'users', uid));
          if (s.exists()) allUsers.set(uid, { uid, ...s.data() });
        } catch (_) {}
      }));
    }
    renderSidebar();
  }, err => console.error('convListener', err));
}

function renderSidebar() {
  const ann = [], dms = [], sup = [];
  const filter = sidebarFilter.toLowerCase();

  conversations.forEach(conv => {
    if (conv.type === 'group') return;
    const displayName = getConvDisplayName(conv);
    if (filter && !displayName.toLowerCase().includes(filter)) return;
    if (conv.type === 'announcement')  ann.push(conv);
    else if (conv.type === 'support')  sup.push(conv);
    else                               dms.push(conv);
  });

  const byTime = (a, b) => {
    const ta = a.lastMessageAt?.toDate?.()?.getTime() || 0;
    const tb = b.lastMessageAt?.toDate?.()?.getTime() || 0;
    return tb - ta;
  };

  const render = (list, elId, emptyKey) => {
    const el = document.getElementById(elId);
    el.innerHTML = list.sort(byTime).map(convItemHtml).join('')
      || `<p class="px-3 py-2 text-xs text-text-muted italic">${t(emptyKey)}</p>`;
  };

  render(ann, 'sidebar-announcements', 'msg_no_ann');
  render(dms, 'sidebar-dms',           'msg_no_dm');
  document.getElementById('sidebar-support-section').style.display = sup.length ? '' : 'none';
  if (sup.length) render(sup, 'sidebar-support', 'msg_no_dm');
}

function getConvDisplayName(conv) {
  if (conv.type === 'support') return t('msg_support_name');
  if (conv.type === 'direct') {
    const otherUid = (conv.members || []).find(u => u !== currentUser.uid);
    if (!otherUid) return t('msg_direct_msg');
    const cached = dmDisplayNames.get(otherUid);
    if (cached && cached !== '__pending__') return cached;
    if (!cached) fetchAndCacheDMName(otherUid);
    return t('msg_direct_msg');
  }
  return conv.name || 'Unnamed';
}

async function fetchAndCacheDMName(uid) {
  if (dmDisplayNames.has(uid)) return;
  dmDisplayNames.set(uid, '__pending__');
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) {
      const d = snap.data();
      dmDisplayNames.set(uid, (d.firstName && d.lastName)
        ? `${d.firstName} ${d.lastName}`
        : (d.name || d.email || 'Unknown'));
    } else {
      dmDisplayNames.set(uid, 'Unknown');
    }
  } catch (err) {
    dmDisplayNames.delete(uid);
    return;
  }
  renderSidebar();
}

function convItemHtml(conv) {
  const isActive    = conv.id === activeConvId;
  const displayName = getConvDisplayName(conv);
  const avatarColor = getAvatarColor(displayName);
  const initials    = getInitials(displayName);
  const lastMsg     = conv.lastMessage ? escHtml(conv.lastMessage).slice(0, 45) : '';
  const lastTime    = conv.lastMessageAt?.toDate ? formatTime(conv.lastMessageAt.toDate()) : '';
  const isAnn       = conv.type === 'announcement';
  const lastMsgTime  = conv.lastMessageAt?.toDate?.()?.getTime() || 0;
  const storedRead   = conv.lastRead?.[currentUser.uid]?.toDate?.()?.getTime() || 0;
  const lastReadTime = Math.max(storedRead, readTimes.get(conv.id) || 0);
  const lastSender   = String(conv.lastMessageBy || '').trim();
  const myUid        = String(currentUser.uid || '').trim();
  const hasUnread    = !!conv.lastMessage && lastSender !== '' && lastSender !== myUid && lastMsgTime > lastReadTime;

  let avatarHtml, onlineDot = '';
  if (conv.type === 'support') {
    avatarHtml = `<span class="material-symbols-outlined text-white text-[18px]" style="font-variation-settings:'FILL' 1;">support_agent</span>`;
  } else if (isAnn) {
    avatarHtml = `<span class="material-symbols-outlined text-white text-[18px]" style="font-variation-settings:'FILL' 1;">campaign</span>`;
  } else {
    const otherUid  = (conv.members || []).find(u => u !== currentUser.uid);
    const otherUser = otherUid ? allUsers.get(otherUid) : null;
    if (otherUser?.photoUrl) {
      avatarHtml = `<img src="${escHtml(otherUser.photoUrl)}" class="w-full h-full object-cover rounded-full" alt="${escHtml(displayName)}"/>`;
    } else {
      avatarHtml = `<span class="text-[13px] font-bold">${escHtml(initials)}</span>`;
    }
    if (otherUid) {
      const online = isOnline(otherUid);
      onlineDot = `<span class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-white ${online ? 'bg-green-500' : 'bg-gray-300'}"></span>`;
    }
  }

  return `
  <button onclick="openConversation('${conv.id}')"
    class="conv-item w-full flex items-center gap-2.5 px-2.5 py-2 mx-0.5 rounded-xl text-left ${isActive ? 'bg-secondary-fixed/60' : 'hover:bg-surface-container'} ${isAnn ? 'border-l-[3px] border-primary-container pl-2' : ''}">
    <div class="relative flex-shrink-0">
      <div class="w-9 h-9 rounded-full flex items-center justify-center text-white"
           style="background:${avatarColor}">${avatarHtml}</div>
      ${onlineDot}
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-1">
        <span class="text-sm font-semibold text-on-surface truncate">${escHtml(displayName)}</span>
        ${lastTime ? `<span class="text-[10px] text-text-muted flex-shrink-0">${lastTime}</span>` : ''}
      </div>
      <p class="text-xs truncate mt-0.5 ${hasUnread ? 'text-on-surface font-medium' : 'text-text-muted'}">${lastMsg || '<span class="italic font-normal text-text-muted">No messages yet</span>'}</p>
    </div>
    ${hasUnread ? '<span class="w-2 h-2 rounded-full bg-secondary flex-shrink-0"></span>' : ''}
  </button>`;
}

window.openConversation = async function(convId) {
  activeConvId = convId;
  readTimes.set(convId, Date.now());
  renderSidebar();
  persistLastRead(convId);

  const conv = conversations.get(convId);
  if (!conv) return;

  // Chat menu — parents can delete their own DMs; announcements have no menu
  document.getElementById('chat-menu').classList.add('hidden');
  document.getElementById('chat-menu-btn').classList.toggle('hidden', conv.type !== 'direct');

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('conv-view').style.display   = 'flex';

  const avatarEl = document.getElementById('chat-avatar');

  if (conv.type === 'direct') {
    const otherUid = (conv.members || []).find(u => u !== currentUser.uid);
    let headerName = t('msg_direct_msg');
    if (otherUid) {
      try {
        const uSnap = await getDoc(doc(db, 'users', otherUid));
        if (uSnap.exists()) {
          const d = uSnap.data();
          headerName = (d.firstName && d.lastName)
            ? `${d.firstName} ${d.lastName}`
            : (d.name || d.email || 'Unknown');
          dmDisplayNames.set(otherUid, headerName);
        }
      } catch (_) {}
    }
    document.getElementById('chat-header-name').textContent = headerName;
    avatarEl.style.background = getAvatarColor(headerName);
    avatarEl.textContent      = getInitials(headerName);
    const online = otherUid ? isOnline(otherUid) : false;
    document.getElementById('chat-header-sub').innerHTML =
      `<span class="${online ? 'text-green-600' : 'text-text-muted'}">● ${online ? t('msg_online') : t('msg_offline')}</span>`;
    renderSidebar();
  } else if (conv.type === 'support') {
    document.getElementById('chat-header-name').textContent = t('msg_support_name');
    avatarEl.style.background = '#7A5A16';
    avatarEl.innerHTML = `<span class="material-symbols-outlined text-white text-[17px]" style="font-variation-settings:'FILL' 1;">support_agent</span>`;
    document.getElementById('chat-header-sub').textContent = t('msg_support_sub');
  } else {
    const displayName = conv.name || 'Announcements';
    document.getElementById('chat-header-name').textContent = displayName;
    avatarEl.style.background = getAvatarColor(displayName);
    avatarEl.innerHTML = `<span class="material-symbols-outlined text-white text-[17px]" style="font-variation-settings:'FILL' 1;">campaign</span>`;
    document.getElementById('chat-header-sub').textContent = t('msg_ann_channel');
  }

  const isReadOnly = conv.type === 'announcement';
  document.getElementById('input-bar').style.display     = isReadOnly ? 'none' : 'flex';
  document.getElementById('readonly-note').style.display = isReadOnly ? 'flex' : 'none';

  startMessageListener(convId);
};

function startMessageListener(convId) {
  if (msgUnsub) { msgUnsub(); msgUnsub = null; }
  const area = document.getElementById('messages-area');
  area.innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;

  const q = query(collection(db, 'messages'), where('conversationId', '==', convId));
  msgUnsub = onSnapshot(q, async snap => {
    msgArr = [];
    snap.forEach(d => msgArr.push({ id: d.id, ...d.data() }));
    msgArr.sort((a, b) =>
      (a.timestamp?.toDate?.()?.getTime() || 0) -
      (b.timestamp?.toDate?.()?.getTime() || 0));
    renderMessages();
    await markAllRead(convId);
    readTimes.set(convId, Date.now());
    persistLastRead(convId);
    renderSidebar();
  }, err => console.error('msgListener', err));
}

// Persist the per-user read marker so unread state survives reloads
function persistLastRead(convId) {
  if (!currentUser) return;
  updateDoc(doc(db, 'conversations', convId), {
    [`lastRead.${currentUser.uid}`]: serverTimestamp()
  }).catch(() => {});
}

function renderMessages() {
  const area = document.getElementById('messages-area');
  if (!msgArr.length) {
    area.innerHTML = `<div class="flex-1 flex items-center justify-center py-16 text-sm text-text-muted italic">${t('msg_no_msgs')}</div>`;
    return;
  }
  const wasAtBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 120;
  area.innerHTML = msgArr.map(buildMessageHtml).join('');
  if (wasAtBottom || msgArr.length < 20) area.scrollTop = area.scrollHeight;
}

function buildMessageHtml(msg) {
  const isOwn  = msg.senderUid === currentUser.uid;
  const ts     = msg.timestamp?.toDate ? formatTimeFull(msg.timestamp.toDate()) : '';
  const sender = escHtml(msg.senderName || 'Unknown');

  // Translation toggle — parents read in whichever language they selected.
  // Server-stored textEn/textKo are instant; otherwise translated on demand.
  const viewerLang   = window.CREMONA_LANG === 'ko' ? 'ko' : 'en';
  const origLang     = msg.origLang || (msg.text ? cremonaDetectLang(msg.text) : viewerLang);
  const canTranslate = !!msg.text && origLang !== viewerLang;
  const showTr       = canTranslate && translatedMsgIds.has(msg.id);
  const serverTr     = viewerLang === 'ko' ? msg.textKo : msg.textEn;
  const displayText  = showTr ? (msg._trText || serverTr || msg.text) : msg.text;
  const trLink = canTranslate
    ? `<button onclick="toggleMsgTranslation('${msg.id}')"
         class="block text-[10px] font-semibold mt-1 hover:underline ${isOwn ? 'text-primary' : 'text-secondary'}">
         ${showTr ? t('msg_show_original') : t('msg_translate')}</button>`
    : '';

  const receipts = (msg.readBy || [])
    .filter(u => u !== currentUser.uid)
    .slice(-3)
    .map(u => {
      const usr  = allUsers.get(u);
      const nm   = usr?.name || '?';
      return `<div class="w-3.5 h-3.5 rounded-full flex items-center justify-center text-[7px] font-bold text-white" style="background:${getAvatarColor(nm)}" title="${escHtml(nm)}">${escHtml(getInitials(nm))}</div>`;
    }).join('');

  let fileHtml = '';
  if (msg.fileUrl) {
    const isImg = (msg.fileType || '').startsWith('image/');
    fileHtml = isImg
      ? `<a href="${escHtml(msg.fileUrl)}" target="_blank" rel="noopener" class="block mt-1.5"><img src="${escHtml(msg.fileUrl)}" class="max-w-[200px] rounded-lg border border-border-subtle" alt="attachment"/></a>`
      : `<a href="${escHtml(msg.fileUrl)}" target="_blank" rel="noopener"
           class="flex items-center gap-2 mt-1.5 px-3 py-2 rounded-lg border ${isOwn ? 'border-amber-200 bg-amber-50' : 'border-border-subtle bg-surface'} text-xs hover:opacity-80 transition-opacity">
           <span class="material-symbols-outlined text-[16px]">description</span>
           <span class="truncate max-w-[150px]">${escHtml(msg.fileName || 'Attachment')}</span>
           <span class="material-symbols-outlined text-[14px] ml-auto opacity-60">download</span>
         </a>`;
  }

  if (isOwn) {
    // Show explicit Read / Unread on own messages in DMs
    let readLabel = '';
    const activeConv = conversations.get(activeConvId);
    if (activeConv?.type === 'direct') {
      const otherUid = (activeConv.members || []).find(u => u !== currentUser.uid);
      const isRead   = otherUid && (msg.readBy || []).includes(otherUid);
      readLabel = isRead
        ? `<span class="text-[10px] font-semibold text-secondary">${t('msg_read')}</span>`
        : `<span class="text-[10px] text-text-muted">${t('msg_unread')}</span>`;
    }
    return `
    <div class="flex flex-col items-end px-4 py-0.5">
      <div class="max-w-[72%]">
        <div class="bg-amber-100 text-on-primary-fixed rounded-2xl rounded-tr-sm px-4 py-2 text-sm leading-relaxed break-words">
          ${msg.text ? escHtml(displayText) : ''}${trLink}${fileHtml}
        </div>
        <div class="flex items-center justify-end gap-1 mt-0.5 pr-0.5">
          ${readLabel}
          <span class="text-[10px] text-text-muted">${ts}</span>
          ${!readLabel && receipts ? `<div class="flex gap-0.5 ml-1">${receipts}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  const senderUser = msg.senderUid ? allUsers.get(msg.senderUid) : null;
  const senderAvatar = senderUser?.photoUrl
    ? `<img src="${escHtml(senderUser.photoUrl)}" class="w-6 h-6 rounded-full flex-shrink-0 object-cover" alt="${escHtml(msg.senderName || '')}"/>`
    : `<div class="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-[9px] font-bold text-white" style="background:${getAvatarColor(msg.senderName || '')}">${escHtml(getInitials(msg.senderName || '?'))}</div>`;

  return `
  <div class="flex items-end gap-2 px-4 py-0.5">
    ${senderAvatar}
    <div class="max-w-[72%]">
      <p class="text-[11px] text-text-muted mb-1 ml-1">${sender}</p>
      <div class="bg-surface-white border border-border-subtle rounded-2xl rounded-tl-sm px-4 py-2 text-sm leading-relaxed text-on-surface break-words">
        ${msg.text ? escHtml(displayText) : ''}${trLink}${fileHtml}
      </div>
      <div class="flex items-center gap-1 mt-0.5 ml-1">
        <span class="text-[10px] text-text-muted">${ts}</span>
        ${receipts ? `<div class="flex gap-0.5 ml-1">${receipts}</div>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Message translation toggle ────────────────────────────────────────────────
window.toggleMsgTranslation = async function(mid) {
  const msg = msgArr.find(m => m.id === mid);
  if (!msg || !msg.text) return;
  if (translatedMsgIds.has(mid)) {
    translatedMsgIds.delete(mid);
    renderMessages();
    return;
  }
  const viewerLang = window.CREMONA_LANG === 'ko' ? 'ko' : 'en';
  let tr = viewerLang === 'ko' ? msg.textKo : msg.textEn;
  if (!tr) {
    try {
      tr = await cremonaTranslate(msg.text, viewerLang);
    } catch (e) {
      console.error('[translate]', e);
      showToast('Translation failed. Please try again.', 'error');
      return;
    }
  }
  msg._trText = tr;
  translatedMsgIds.add(mid);
  renderMessages();
};

async function markAllRead(convId) {
  if (!currentUser || !msgArr.length) return;
  const myUid = String(currentUser.uid).trim();
  try {
    const batch = writeBatch(db);
    let   count = 0;
    msgArr.forEach(msg => {
      const alreadyRead = (msg.readBy || []).some(u => String(u).trim() === myUid);
      if (!alreadyRead) {
        batch.update(doc(db, 'messages', msg.id), { readBy: arrayUnion(currentUser.uid) });
        count++;
      }
    });
    if (count > 0) await batch.commit();
  } catch (e) { console.error('[markAllRead]', e); }
}

window.sendMessage = async function() {
  if (!activeConvId || !currentUser) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text && !pendingFile) return;

  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  input.style.height = '';

  try {
    let fileUrl = '', fileName = '', fileType = '';
    if (pendingFile) {
      showToast('Uploading…', 'info');
      ({ fileUrl, fileName, fileType } = await uploadFile(pendingFile));
      clearFile();
    }

    const senderName = (currentUserData.firstName && currentUserData.lastName)
      ? `${currentUserData.firstName} ${currentUserData.lastName}`
      : (currentUserData.name || currentUser.email || 'Unknown');

    const msgData = {
      conversationId: activeConvId,
      senderUid:      currentUser.uid,
      senderName,
      text,
      timestamp:      serverTimestamp(),
      readBy:         [currentUser.uid]
    };
    if (fileUrl) { msgData.fileUrl = fileUrl; msgData.fileName = fileName; msgData.fileType = fileType; }

    await addDoc(collection(db, 'messages'), msgData);
    await updateDoc(doc(db, 'conversations', activeConvId), {
      lastMessage:   text || fileName,
      lastMessageAt: serverTimestamp(),
      lastMessageBy: currentUser.uid
    });

    input.value = '';
  } catch (e) {
    console.error('sendMessage', e);
    showToast('Failed to send. Try again.', 'error');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
};

window.handleFileSelect = function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 20 * 1024 * 1024) { showToast('File too large (max 20MB).', 'error'); return; }
  pendingFile = file;
  document.getElementById('file-preview-name').textContent = file.name;
  document.getElementById('file-preview').style.display = 'flex';
};

window.clearFile = function() {
  pendingFile = null;
  document.getElementById('file-preview').style.display = 'none';
  const fi = document.getElementById('file-input');
  if (fi) fi.value = '';
};

async function uploadFile(file) {
  const key = `messages/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', `${WORKER_URL}/${key}`);
    xhr.setRequestHeader('Content-Type', file.type);
    xhr.onload  = () => xhr.status === 200
      ? resolve({ fileUrl: `${R2_PUBLIC_BASE}/${key}`, fileName: file.name, fileType: file.type })
      : reject(new Error(`Upload failed: ${xhr.status}`));
    xhr.onerror = () => reject(new Error('Upload network error'));
    xhr.send(file);
  });
}

window.handleMsgKeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

window.autoResize = function(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
};

window.filterSidebar = function(val) {
  sidebarFilter = val;
  renderSidebar();
};

// ── New chat (parents may only message teachers — never other parents) ───────
function teacherCandidates() {
  const out = [];
  allUsers.forEach(u => {
    if (u.uid === currentUser.uid) return;
    if (u.status === 'deleted' || u.status === 'inactive') return;
    if (u.role !== 'teacher') return;
    out.push(u);
  });
  return out.sort((a, b) => userDisplayName(a).localeCompare(userDisplayName(b)));
}

function userDisplayName(u) {
  return (u.firstName && u.lastName) ? `${u.firstName} ${u.lastName}` : (u.name || u.email || 'Unknown');
}

window.openNewChatModal = function() {
  document.getElementById('newchat-search').value = '';
  renderNewChatList('');
  document.getElementById('newchat-modal').classList.remove('hidden');
  document.getElementById('newchat-search').focus();
};

window.closeNewChatModal = function() {
  document.getElementById('newchat-modal').classList.add('hidden');
};

window.renderNewChatList = function(filter) {
  const f    = (filter || '').toLowerCase();
  const list = teacherCandidates().filter(u =>
    !f || userDisplayName(u).toLowerCase().includes(f) || (u.email || '').toLowerCase().includes(f));
  document.getElementById('newchat-list').innerHTML = list.length ? list.map(u => {
    const name = userDisplayName(u);
    return `
    <button onclick="startDirectChat('${u.uid}')"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-surface-container transition-colors text-left">
      <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-[13px] font-bold flex-shrink-0"
           style="background:${getAvatarColor(name)}">${escHtml(getInitials(name))}</div>
      <p class="text-sm font-semibold text-on-surface truncate">${escHtml(name)}</p>
    </button>`;
  }).join('') : '<p class="px-4 py-6 text-center text-xs text-text-muted italic">No teachers found</p>';
};

window.startDirectChat = async function(otherUid) {
  closeNewChatModal();
  let existing = null;
  conversations.forEach(c => {
    if (c.type === 'direct' && (c.members || []).includes(otherUid)) existing = c;
  });
  if (existing) { openConversation(existing.id); return; }
  try {
    const ref = await addDoc(collection(db, 'conversations'), {
      type:          'direct',
      members:       [currentUser.uid, otherUid],
      createdBy:     currentUser.uid,
      createdAt:     serverTimestamp(),
      lastMessage:   '',
      lastMessageAt: serverTimestamp(),
      lastMessageBy: ''
    });
    const openWhenReady = setInterval(() => {
      if (conversations.has(ref.id)) { clearInterval(openWhenReady); openConversation(ref.id); }
    }, 150);
    setTimeout(() => clearInterval(openWhenReady), 5000);
  } catch (e) {
    console.error('startDirectChat', e);
    showToast('Failed to start chat.', 'error');
  }
};

// ── Contact support ───────────────────────────────────────────────────────────
window.contactSupport = async function() {
  let existing = null;
  conversations.forEach(c => { if (c.type === 'support') existing = c; });
  if (existing) { openConversation(existing.id); return; }
  try {
    const ref = await addDoc(collection(db, 'conversations'), {
      type:          'support',
      name:          'Support',
      members:       [currentUser.uid],
      createdBy:     currentUser.uid,
      createdAt:     serverTimestamp(),
      lastMessage:   '',
      lastMessageAt: serverTimestamp(),
      lastMessageBy: ''
    });
    const openWhenReady = setInterval(() => {
      if (conversations.has(ref.id)) { clearInterval(openWhenReady); openConversation(ref.id); }
    }, 150);
    setTimeout(() => clearInterval(openWhenReady), 5000);
  } catch (e) {
    console.error('contactSupport', e);
    showToast('Failed to open support chat.', 'error');
  }
};

// ── Chat menu: delete DM ──────────────────────────────────────────────────────
window.toggleChatMenu = function() {
  document.getElementById('chat-menu').classList.toggle('hidden');
};

document.addEventListener('click', e => {
  if (!e.target.closest('#chat-menu') && !e.target.closest('#chat-menu-btn')) {
    document.getElementById('chat-menu')?.classList.add('hidden');
  }
});

window.deleteChat = async function() {
  document.getElementById('chat-menu').classList.add('hidden');
  const conv = conversations.get(activeConvId);
  if (!conv || conv.type !== 'direct') return;
  if (!confirm('Delete this conversation and all its messages for everyone? This cannot be undone.')) return;
  try {
    const snap = await getDocs(query(collection(db, 'messages'), where('conversationId', '==', conv.id)));
    const docs = snap.docs;
    for (let i = 0; i < docs.length; i += 400) {
      const batch = writeBatch(db);
      docs.slice(i, i + 400).forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
    await deleteDoc(doc(db, 'conversations', conv.id));
    activeConvId = null;
    if (msgUnsub) { msgUnsub(); msgUnsub = null; }
    document.getElementById('empty-state').style.display = '';
    document.getElementById('conv-view').style.display   = 'none';
    showToast('Chat deleted.', 'success');
  } catch (e) {
    console.error('deleteChat', e);
    showToast('Failed to delete chat.', 'error');
  }
};

function getAvatarColor(str) {
  const palette = ['#3B2A1E','#7A5A16','#1e6e3b','#b91c1c','#7c3aed',
                   '#0e7490','#c2410c','#0f766e','#1d4ed8','#be185d'];
  let h = 0;
  for (const c of (str || '')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return palette[h % palette.length];
}

function getInitials(name) {
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  return (name || '?').slice(0, 2).toUpperCase();
}

function formatTime(date) {
  const now  = new Date();
  const diff = now - date;
  if (diff < 60000)   return 'now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m`;
  if (date.toDateString() === now.toDateString())
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatTimeFull(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.className = `show ${type}`;
  setTimeout(() => { toast.className = ''; }, 3000);
}
