<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Comments | Cremona Parent Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#3B2A1E", "primary-container": "#C8A951",
          "on-primary-fixed": "#2A1D14", "on-primary-container": "#5A4A22",
          "secondary": "#7A5A16", "secondary-fixed": "#F2E6CC",
          "surface": "#FAF6EF", "surface-white": "#FFFFFF",
          "surface-container": "#F1E9DC", "surface-container-low": "#F6F0E6",
          "on-surface": "#2B2019", "on-surface-variant": "#6B5844",
          "border-subtle": "#E2D7C6", "text-muted": "#7A6A57",
          "error": "#B3261E"
        },
        fontFamily: { sans: ["Inter", "sans-serif"] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #FAF6EF; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(59,42,30,0.15); border-top-color: #3B2A1E; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .child-tab { border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  .child-tab.active { color: #7A5A16; border-bottom-color: #7A5A16; font-weight: 600; }
  .child-tab:not(.active) { color: #7A6A57; }
  .child-tab:not(.active):hover { color: #2B2019; }
  .report-card { transition: box-shadow .15s; }
  .report-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .expand-body { display: none; }
  .expand-body.open { display: block; }
  .expand-icon { transition: transform .2s; }
  .expanded .expand-icon { transform: rotate(180deg); }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity:1; }
  #toast.error   { background:#B3261E; color:#fff; }
  #toast.success { background:#1e6e3b; color:#fff; }
  #toast.info    { background:#7A5A16; color:#fff; }
</style>
<script src="/js/theme.js"></script>
<script src="/js/translate.js"></script>
</head>
<body class="text-on-surface min-h-screen flex flex-col" data-portal="parent" data-page="comments">

<script>
window.CREMONA_LANG = localStorage.getItem('cremona-lang') || 'en';
window.toggleLang = function() {
  window.CREMONA_LANG = window.CREMONA_LANG === 'en' ? 'ko' : 'en';
  localStorage.setItem('cremona-lang', window.CREMONA_LANG);
  if (window._i18nApply) window._i18nApply();
  if (window._rerender)  window._rerender();
};
</script>

<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">
    <div class="spinner"></div>
    <p class="text-text-muted text-sm">Loading...</p>
  </div>
</div>

<div id="toast"></div>

<header class="bg-surface-white border-b border-border-subtle shadow-sm sticky top-0 z-50">
  <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between gap-4">
    <div class="flex items-center gap-6">
      <img src="/logo.png" alt="Cremona Music" class="h-8 w-auto rounded-lg"/>
      <nav class="hidden sm:flex items-center gap-5">
        <a data-i18n="nav_dashboard" href="dashboard" class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Dashboard</a>
        <a data-i18n="nav_schedule"  href="schedule"  class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Schedule</a>
        <a data-i18n="nav_reports"   href="reports"   class="text-sm font-bold text-secondary border-b-2 border-secondary pb-0.5">Comments</a>
        <a data-i18n="nav_messages"  href="messages"  class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Messages</a>
        <a data-i18n="nav_payments"  href="payments"  class="text-sm font-medium text-text-muted hover:text-primary transition-colors">Payments</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <span id="header-name" class="hidden sm:block text-sm text-text-muted font-medium"></span>
      <button id="lang-toggle" onclick="toggleLang()"
              class="text-xs font-semibold px-2.5 py-1.5 rounded-lg border border-border-subtle text-text-muted hover:bg-surface-container transition-colors flex-shrink-0">
        한국어
      </button>
      <button onclick="doSignOut()"
              class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium text-text-muted hover:bg-surface-container hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined text-[18px]">logout</span>
        <span data-i18n="nav_signout" class="hidden sm:inline">Sign Out</span>
      </button>
    </div>
  </div>
</header>

<main class="flex-1 max-w-4xl mx-auto w-full px-6 py-8">
  <h1 data-i18n="rep_title" class="text-2xl font-bold text-on-surface mb-6">Comments</h1>
  <div id="child-tabs-wrap" class="hidden mb-6 border-b border-border-subtle">
    <div id="child-tabs" class="flex gap-6 overflow-x-auto"></div>
  </div>
  <div id="reports-area">
    <div class="flex items-center justify-center py-16"><div class="spinner"></div></div>
  </div>
</main>

<footer class="py-4 text-center text-xs text-text-muted border-t border-border-subtle">
  <span data-i18n="footer">© 2026 Cremona Music.</span>
</footer>

<script type="module">
import { initializeApp }                         from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs,
         collection, query, where, orderBy }     from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app  = initializeApp({
  apiKey: "REPLACE_ME_CREMONA_API_KEY",
  authDomain: "portal.cremonamusic.com",
  projectId: "cremona-portal",
  storageBucket: "cremona-portal.firebasestorage.app",
  messagingSenderId: "REPLACE_ME_SENDER_ID",
  appId: "REPLACE_ME_APP_ID"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── i18n ──────────────────────────────────────────────────────────────────────
const TRANS = {
  en: {
    nav_dashboard:'Dashboard', nav_schedule:'Schedule', nav_reports:'Comments',
    nav_messages:'Messages', nav_payments:'Payments', nav_signout:'Sign Out',
    rep_title:'Comments',
    rep_approved:'Approved', rep_submitted:'Submitted',
    rep_books:'Books Studied', rep_feedback:'Feedback by Category',
    rep_enhancement:'Areas for Enhancement', rep_evaluation:'Overall Evaluation',
    rep_no_cats:'No categories recorded.', rep_none_noted:'None noted.',
    rep_no_eval:'No evaluation provided.',
    rep_translate:'Translate report', rep_show_original:'Show original',
    rep_empty_h:'No approved reports yet',
    rep_empty_p:"Comments will appear here once your child's teacher submits and they're approved.",
    rep_no_children:'No children linked to your account yet.',
    rep_no_records:'No student records found.',
    footer:'© 2026 Cremona Music.',
  },
  ko: {
    nav_dashboard:'대시보드', nav_schedule:'일정', nav_reports:'보고서',
    nav_messages:'메시지', nav_payments:'결제', nav_signout:'로그아웃',
    rep_title:'보고서',
    rep_approved:'승인됨', rep_submitted:'제출됨',
    rep_books:'학습한 도서', rep_feedback:'카테고리별 피드백',
    rep_enhancement:'개선 사항', rep_evaluation:'종합 평가',
    rep_no_cats:'카테고리가 없습니다.', rep_none_noted:'해당 없음.',
    rep_no_eval:'평가 내용이 없습니다.',
    rep_translate:'보고서 번역', rep_show_original:'원문 보기',
    rep_empty_h:'아직 승인된 보고서가 없습니다',
    rep_empty_p:'교사가 제출하고 승인되면 보고서가 여기에 표시됩니다.',
    rep_no_children:'아직 연결된 자녀가 없습니다.',
    rep_no_records:'학생 정보를 찾을 수 없습니다.',
    footer:'© 2026 Cremona Music.',
  }
};

function t(key) {
  return TRANS[window.CREMONA_LANG || 'en']?.[key] || TRANS.en[key] || key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = (window.CREMONA_LANG === 'en') ? '한국어' : 'English';
  document.documentElement.lang = window.CREMONA_LANG || 'en';
}

window._i18nApply = applyTranslations;

let _currentReports = [];

window._rerender = function() {
  renderReports(_currentReports);
  applyTranslations();
};

let allStudents = [], selectedSid = '', expandedIds = new Set();

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 3500);
}
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return isNaN(d) ? str : d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function avatarBg(name) {
  const colors = ['#3B2A1E','#7A5A16','#1e6e3b','#c2410c','#6d28d9','#0369a1'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/'; return; }
  let parentData;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || snap.data().role !== 'parent') {
      await signOut(auth); window.location.href = '/'; return;
    }
    parentData = snap.data();
  } catch (e) { window.location.href = '/'; return; }

  const firstName = parentData.firstName || (parentData.name || '').split(' ')[0] || '';
  if (firstName) document.getElementById('header-name').textContent = firstName;

  const linkedIds = Array.isArray(parentData.linkedStudentIds) ? parentData.linkedStudentIds : [];
  if (!linkedIds.length) {
    document.getElementById('loading-overlay').style.display = 'none';
    renderEmpty(t('rep_no_children'));
    applyTranslations();
    return;
  }

  try {
    const snaps = await Promise.all(linkedIds.map(id => getDoc(doc(db, 'students', id))));
    allStudents = snaps.filter(s => s.exists()).map(s => ({ id: s.id, ...s.data() }));
  } catch (e) {
    document.getElementById('loading-overlay').style.display = 'none';
    showToast('Failed to load student data.', 'error');
    return;
  }

  if (!allStudents.length) {
    document.getElementById('loading-overlay').style.display = 'none';
    renderEmpty(t('rep_no_records'));
    applyTranslations();
    return;
  }

  const urlSid = new URLSearchParams(window.location.search).get('studentId') || '';
  selectedSid  = allStudents.find(s => s.id === urlSid) ? urlSid : allStudents[0].id;

  renderTabs();
  applyTranslations();
  document.getElementById('loading-overlay').style.display = 'none';
  await loadAndRenderReports(selectedSid);
});

function renderTabs() {
  if (allStudents.length < 2) return;
  const wrap = document.getElementById('child-tabs-wrap');
  const tabs = document.getElementById('child-tabs');
  wrap.classList.remove('hidden');
  tabs.innerHTML = allStudents.map(s => {
    const name    = s.fullName || '—';
    const initials = name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2);
    const bg      = avatarBg(name);
    return `
      <button data-sid="${escHtml(s.id)}"
              class="child-tab ${s.id === selectedSid ? 'active' : ''} flex items-center gap-2 pb-3 px-1 text-sm whitespace-nowrap"
              onclick="switchChild('${escHtml(s.id)}')">
        <span class="w-6 h-6 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0"
              style="background:${bg}">${escHtml(initials)}</span>
        ${escHtml(name)}
      </button>`;
  }).join('');
}

window.switchChild = async function(sid) {
  if (sid === selectedSid) return;
  selectedSid = sid;
  expandedIds.clear();
  document.querySelectorAll('#child-tabs .child-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sid === sid);
  });
  await loadAndRenderReports(sid);
};

async function loadAndRenderReports(sid) {
  const area = document.getElementById('reports-area');
  area.innerHTML = `<div class="flex items-center justify-center py-16"><div class="spinner"></div></div>`;
  let reports = [];
  try {
    const q    = query(collection(db,'comments'), where('studentId','==',sid), where('status','==','approved'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    reports    = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    try {
      const q2   = query(collection(db,'comments'), where('studentId','==',sid), where('status','==','approved'));
      const snap = await getDocs(q2);
      reports    = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a,b) => {
          const ta = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
          const tb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
          return tb - ta;
        });
    } catch (e2) {
      area.innerHTML = `<p class="text-error text-sm py-8 text-center">Failed to load reports: ${escHtml(e2.message)}</p>`;
      return;
    }
  }
  _currentReports = reports;
  renderReports(reports);
}

function renderReports(reports) {
  const area = document.getElementById('reports-area');
  if (!reports.length) {
    area.innerHTML = `
      <div class="flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <span class="material-symbols-outlined text-5xl opacity-30">description</span>
        <p class="font-semibold text-sm">${t('rep_empty_h')}</p>
        <p class="text-xs">${t('rep_empty_p')}</p>
      </div>`;
    return;
  }
  area.innerHTML = reports.map(r => buildReportCard(r)).join('');
  expandedIds.forEach(id => {
    const card = document.querySelector(`[data-rid="${id}"]`);
    if (card) {
      card.classList.add('expanded');
      card.querySelector('.expand-body')?.classList.add('open');
      card.querySelector('.expand-icon').textContent = 'expand_less';
    }
  });
  document.querySelectorAll('.report-card[data-rid]').forEach(card => {
    card.querySelector('.report-header-btn')?.addEventListener('click', () => toggleCard(card));
  });
}

function buildReportCard(r) {
  const dateRange = (r.dateRangeStart && r.dateRangeEnd)
    ? `${fmtDate(r.dateRangeStart)} – ${fmtDate(r.dateRangeEnd)}`
    : r.dateRangeStart ? fmtDate(r.dateRangeStart) : '';
  const submittedStr = r.createdAt?.toDate
    ? r.createdAt.toDate().toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
    : '';
  const books      = Array.isArray(r.books) ? r.books : [];
  const categories = Array.isArray(r.categories) ? r.categories.filter(c => c.name) : [];
  const enhancements = Array.isArray(r.enhancementAreas) ? r.enhancementAreas.filter(Boolean) : [];

  // Translation: swap in translated copies when the parent toggled it on.
  const trOn      = !!(r._showTr && r._trans);
  const evalText  = trOn ? (r._trans.evaluation || r.evaluation) : r.evaluation;
  const catTexts  = categories.map((c, i) => trOn ? (r._trans.feedbacks?.[i] || c.feedback) : c.feedback);
  const enhTexts  = enhancements.map((e, i) => trOn ? (r._trans.enhancements?.[i] || e) : e);
  // Offer the button when the report's language differs from the parent's UI language
  const viewerLang = window.CREMONA_LANG === 'ko' ? 'ko' : 'en';
  const sampleText = [r.evaluation, ...categories.map(c => c.feedback), ...enhancements].find(x => x && x.trim()) || '';
  const canTr = sampleText && cremonaDetectLang(sampleText) !== viewerLang;
  const trBtnHtml = canTr ? `
    <button onclick="toggleReportTranslation('${escHtml(r.id)}')"
            class="self-start flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-secondary/40 text-secondary text-xs font-bold hover:bg-secondary/10 transition-colors">
      <span class="material-symbols-outlined text-[14px]">translate</span>
      ${trOn ? t('rep_show_original') : t('rep_translate')}
    </button>` : '';

  const booksHtml = books.length
    ? books.map(b => `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full bg-primary-container/20 text-primary text-xs font-medium">${escHtml(b.title || b)}</span>`).join('')
    : '<span class="text-text-muted text-sm">—</span>';
  const categoriesHtml = categories.length
    ? categories.map((c, i) => `
        <div class="border border-border-subtle rounded-xl overflow-hidden">
          <div class="px-4 py-2 bg-surface-container-low border-b border-border-subtle">
            <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wide">${escHtml(c.name)}</p>
          </div>
          <div class="px-4 py-3">
            <p class="text-sm text-on-surface leading-relaxed">${escHtml(catTexts[i] || '—')}</p>
          </div>
        </div>`).join('')
    : `<p class="text-text-muted text-sm">${t('rep_no_cats')}</p>`;
  const enhancementsHtml = enhancements.length
    ? `<ul class="list-none flex flex-col gap-1.5">${enhTexts.map(e =>
        `<li class="flex items-start gap-2 text-sm text-on-surface">
          <span class="material-symbols-outlined text-[16px] text-primary mt-0.5 flex-shrink-0" style="font-variation-settings:'FILL' 1;">star</span>
          ${escHtml(e)}
        </li>`).join('')}</ul>`
    : `<p class="text-text-muted text-sm">${t('rep_none_noted')}</p>`;
  const evaluationHtml = r.evaluation
    ? `<p class="text-sm text-on-surface leading-relaxed whitespace-pre-wrap">${escHtml(evalText)}</p>`
    : `<p class="text-text-muted text-sm">${t('rep_no_eval')}</p>`;

  return `
    <div class="report-card bg-surface-white rounded-2xl border border-border-subtle mb-4 overflow-hidden" data-rid="${escHtml(r.id)}">
      <button class="report-header-btn w-full text-left px-6 py-5 flex items-start justify-between gap-4 hover:bg-surface-container-low transition-colors">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap mb-1">
            <span class="inline-flex items-center gap-1 px-2.5 py-0.5 bg-green-50 text-green-700 text-xs font-semibold rounded-full border border-green-200">
              <span class="material-symbols-outlined text-[12px]" style="font-variation-settings:'FILL' 1;">verified</span>
              ${t('rep_approved')}
            </span>
            ${dateRange ? `<span class="text-sm font-semibold text-on-surface">${escHtml(dateRange)}</span>` : ''}
          </div>
          <div class="flex flex-wrap items-center gap-3 mt-1 text-xs text-text-muted">
            ${r.classTime ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span>${escHtml(r.classTime)}</span>` : ''}
            ${r.teacherName ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">person</span>${escHtml(r.teacherName)}</span>` : ''}
            ${submittedStr ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">calendar_today</span>${t('rep_submitted')} ${escHtml(submittedStr)}</span>` : ''}
          </div>
          ${r.evaluation ? `<p class="text-sm text-text-muted mt-2 line-clamp-2 text-left">${escHtml(r.evaluation)}</p>` : ''}
        </div>
        <span class="material-symbols-outlined expand-icon text-text-muted flex-shrink-0 mt-1">expand_more</span>
      </button>
      <div class="expand-body border-t border-border-subtle">
        <div class="px-6 py-6 flex flex-col gap-6">
          ${trBtnHtml}
          <div>
            <p class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-2">${t('rep_books')}</p>
            <div class="flex flex-wrap gap-2">${booksHtml}</div>
          </div>
          <div>
            <p class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-3">${t('rep_feedback')}</p>
            <div class="flex flex-col gap-3">${categoriesHtml}</div>
          </div>
          <div>
            <p class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-2">${t('rep_enhancement')}</p>
            ${enhancementsHtml}
          </div>
          <div>
            <p class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-2">${t('rep_evaluation')}</p>
            ${evaluationHtml}
          </div>
        </div>
      </div>
    </div>`;
}

// ── Comment translation toggle ─────────────────────────────────────────────────
window.toggleReportTranslation = async function(rid) {
  const r = _currentReports.find(x => x.id === rid);
  if (!r) return;
  if (r._showTr) {
    r._showTr = false;
    renderReports(_currentReports);
    return;
  }
  const viewerLang = window.CREMONA_LANG === 'ko' ? 'ko' : 'en';
  // Translate once per language, then cache on the report object
  if (!r._trans || r._transLang !== viewerLang) {
    showToast(viewerLang === 'ko' ? '번역 중…' : 'Translating…', 'info');
    const categories   = Array.isArray(r.categories) ? r.categories.filter(c => c.name) : [];
    const enhancements = Array.isArray(r.enhancementAreas) ? r.enhancementAreas.filter(Boolean) : [];
    try {
      const [evaluation, feedbacks, enhancementsTr] = await Promise.all([
        r.evaluation ? cremonaTranslate(r.evaluation, viewerLang) : Promise.resolve(''),
        cremonaTranslateAll(categories.map(c => c.feedback || ''), viewerLang),
        cremonaTranslateAll(enhancements, viewerLang),
      ]);
      r._trans = { evaluation, feedbacks, enhancements: enhancementsTr };
      r._transLang = viewerLang;
    } catch (e) {
      console.error('[report translate]', e);
      showToast(viewerLang === 'ko' ? '번역에 실패했습니다. 다시 시도해 주세요.' : 'Translation failed. Please try again.', 'error');
      return;
    }
  }
  r._showTr = true;
  renderReports(_currentReports);
};

function toggleCard(card) {
  const rid  = card.dataset.rid;
  const body = card.querySelector('.expand-body');
  const icon = card.querySelector('.expand-icon');
  const isOpen = card.classList.toggle('expanded');
  body.classList.toggle('open', isOpen);
  icon.textContent = isOpen ? 'expand_less' : 'expand_more';
  if (isOpen) expandedIds.add(rid);
  else        expandedIds.delete(rid);
}

function renderEmpty(msg) {
  document.getElementById('reports-area').innerHTML = `
    <div class="flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
      <span class="material-symbols-outlined text-5xl opacity-30">description</span>
      <p class="font-semibold text-sm">${escHtml(msg)}</p>
    </div>`;
}

window.doSignOut = async function() {
  await signOut(auth); window.location.href = '/';
};
</script>
