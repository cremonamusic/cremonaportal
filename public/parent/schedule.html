<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" href="/favicon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Schedule | Cremona Music Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#C9A227", "primary-container": "#F5E5B0",
          "on-primary-fixed": "#3E2C23", "on-primary-container": "#8B6020",
          "secondary": "#C9A227", "secondary-fixed": "#F0E8C0",
          "surface": "#FAF6EF", "surface-white": "#FFFDF9",
          "surface-container": "#F0E8D6", "surface-container-low": "#F5EFE4",
          "on-surface": "#3E2C23", "on-surface-variant": "#7A5A42",
          "border-subtle": "#E8DCC8", "text-muted": "#8B6B52",
          "error": "#ba1a1a", "background": "#FAF6EF"
        },
        fontFamily: { sans: ["Inter", "sans-serif"] }
      }
    }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #FAF6EF; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(201,162,39,0.15); border-top-color: #C9A227; border-radius: 50%; animation: spin 0.7s linear infinite; }
  #toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap; }
  #toast.show { opacity: 1; }
  #toast.error   { background: #ba1a1a; color: #fff; }
  #toast.success { background: #1e6e3b; color: #fff; }
  #toast.info    { background: #3B2A1E; color: #F5EFE4; }
  .filter-chip { transition: all .15s; }
  .filter-chip.active { background:#C9A227; color:#3E2C23; border-color:#C9A227; font-weight:700; }
  .class-card { transition: box-shadow .15s, transform .1s; }
  .class-card.clickable:hover { box-shadow:0 4px 14px rgba(0,0,0,.08); cursor:pointer; }
</style>
<style id="cremona-palette">
header { background-color: #3B2A1E !important; border-bottom-color: rgba(255,255,255,0.08) !important; box-shadow: 0 1px 5px rgba(0,0,0,0.4) !important; }
header img[src*="logo"] { filter: invert(1) brightness(1.2); }
header nav a, header nav button span:not(.material-symbols-outlined) { color: rgba(255,248,235,0.72) !important; }
header nav a:hover { color: #C9A227 !important; }
header nav a.nav-active, header nav a[class*="text-secondary"], header nav a[class*="border-secondary"], header nav a[class*="border-b-2"] { color: #C9A227 !important; border-color: #C9A227 !important; }
footer { background-color: #3B2A1E !important; border-top-color: rgba(255,255,255,0.08) !important; }
footer p, footer span:not(.material-symbols-outlined), footer small { color: rgba(255,248,235,0.65) !important; }
footer a { color: #C9A227 !important; }
footer img[src*="logo"] { filter: invert(1) brightness(1.2); }
</style>
</head>
<body class="text-on-surface min-h-screen flex flex-col">

<div id="loading-overlay" class="fixed inset-0 bg-white z-[200] flex items-center justify-center">
  <div class="flex flex-col items-center gap-3">
    <div class="spinner"></div>
    <p class="text-text-muted text-sm">Loading...</p>
  </div>
</div>

<div id="toast"></div>

<main class="flex-1 max-w-2xl mx-auto w-full px-4 sm:px-6 py-6">

  <h1 class="text-2xl font-bold text-on-surface mb-1">Schedule</h1>
  <p class="text-sm text-text-muted mb-5">Upcoming classes for your children.</p>

  <!-- Child filter chips (shown when >1 child) -->
  <div id="filter-chips" class="hidden flex-wrap gap-2 mb-5"></div>

  <!-- Class list -->
  <div id="class-list" class="flex flex-col gap-6">
    <div class="flex items-center justify-center py-16 gap-3 text-text-muted text-sm"><div class="spinner"></div> Loading…</div>
  </div>

</main>

<footer class="py-4 text-center text-xs text-text-muted border-t border-border-subtle">
  © 2025 Cremona Music.
</footer>

<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app  = initializeApp({
  apiKey:            "AIzaSyB_TQF-oExYsPY4qOJtfrcDCwXbc4HV0-0",
  authDomain:        "cremonamusic-portal.firebaseapp.com",
  projectId:         "cremonamusic-portal",
  storageBucket:     "cremonamusic-portal.firebasestorage.app",
  messagingSenderId: "227259733472",
  appId:             "1:227259733472:web:3cb86ab0da1d5338858785"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ───────────────────────────────────────────────────────────────────
let allStudents = [];         // [{id, fullName, ...}]
let allSessions = [];         // merged across children, each tagged with studentId/studentName
let selectedFilter = 'all';   // 'all' | studentId

// ── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type = 'info') { const el = document.getElementById('toast'); el.textContent = msg; el.className = `show ${type}`; setTimeout(() => { el.className = ''; }, 3500); }
function avatarBg(name) { const colors = ['#C9A227','#7A5230','#1e6e3b','#c2410c','#6d28d9','#0369a1']; let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff; return colors[Math.abs(h) % colors.length]; }
function initials(name) { return (name || '?').split(' ').map(p => p[0]).join('').toUpperCase().slice(0, 2); }
function toDate(v) { if (!v) return new Date(0); if (v.toDate) return v.toDate(); return new Date(v); }
function getMonday(d) { const date = new Date(d); const day = date.getDay(); date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day)); date.setHours(0,0,0,0); return date; }
function fmtTime(d) { return d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }); }
function absUrl(url) { return /^https?:\/\//i.test(url) ? url : 'https://' + url; }
function getDisplayStatus(s) { if (s.status === 'cancelled') return 'cancelled'; return toDate(s.dateTime) < new Date() ? 'completed' : 'scheduled'; }

// Friendly week header label ("This week", "Next week", or "Week of Mon D")
function weekLabel(monday) {
  const thisMon = getMonday(new Date());
  const diffWeeks = Math.round((monday - thisMon) / (7 * 864e5));
  if (diffWeeks === 0) return 'This Week';
  if (diffWeeks === 1) return 'Next Week';
  const end = new Date(monday); end.setDate(end.getDate() + 6);
  const o = { month: 'short', day: 'numeric' };
  return `Week of ${monday.toLocaleDateString('en-US', o)}`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderChips() {
  const wrap = document.getElementById('filter-chips');
  if (allStudents.length < 2) { wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  wrap.classList.add('flex');
  const chip = (id, label) =>
    `<button onclick="setFilter('${id}')" class="filter-chip ${selectedFilter === id ? 'active' : ''} px-3.5 py-1.5 rounded-full border border-border-subtle bg-surface-white text-sm text-text-muted hover:border-secondary transition-colors">${escHtml(label)}</button>`;
  wrap.innerHTML = chip('all', 'All Children') + allStudents.map(s => chip(s.id, (s.fullName || 'Child').split(' ')[0])).join('');
}

window.setFilter = function(id) { selectedFilter = id; renderChips(); renderList(); };

function renderList() {
  const listEl = document.getElementById('class-list');
  const now = new Date();

  // Upcoming, non-cancelled, filtered by selected child, sorted ascending
  let items = allSessions
    .filter(s => getDisplayStatus(s) !== 'cancelled')
    .filter(s => toDate(s.dateTime) >= new Date(now.getTime() - 30 * 60000))   // include just-started
    .filter(s => selectedFilter === 'all' || s.studentId === selectedFilter)
    .sort((a, b) => toDate(a.dateTime) - toDate(b.dateTime));

  if (!items.length) {
    listEl.innerHTML = `
      <div class="flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center">
          <span class="material-symbols-outlined text-[36px] opacity-40">event_available</span>
        </div>
        <p class="font-semibold text-on-surface-variant">No upcoming classes</p>
        <p class="text-xs max-w-[260px]">When your ${allStudents.length > 1 ? "children's" : "child's"} teacher schedules a class, it'll appear here.</p>
      </div>`;
    return;
  }

  // Group by week (Monday)
  const groups = new Map();  // mondayMs → [items]
  items.forEach(s => {
    const key = getMonday(toDate(s.dateTime)).getTime();
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(s);
  });

  let html = '';
  [...groups.keys()].sort((a, b) => a - b).forEach(key => {
    html += `<section>
      <h2 class="text-xs font-bold uppercase tracking-widest text-text-muted mb-2.5 px-1">${escHtml(weekLabel(new Date(key)))}</h2>
      <div class="flex flex-col gap-2.5">${groups.get(key).map(cardHtml).join('')}</div>
    </section>`;
  });
  listEl.innerHTML = html;

  listEl.querySelectorAll('.class-card.clickable').forEach(el => {
    el.addEventListener('click', () => { const link = el.dataset.meet; if (link) window.open(absUrl(link), '_blank', 'noopener'); });
  });
}

function cardHtml(s) {
  const dt      = toDate(s.dateTime);
  const child   = s.studentName || 'Child';
  const bg      = avatarBg(child);
  const dateStr = dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  const timeStr = fmtTime(dt);
  const hasLink = s.meetLink && getDisplayStatus(s) !== 'cancelled';
  const isToday = dt.toDateString() === new Date().toDateString();

  return `
  <div class="class-card ${hasLink ? 'clickable' : ''} bg-surface-white border border-border-subtle rounded-2xl p-4 flex items-center gap-4 shadow-sm"
       data-meet="${hasLink ? escHtml(s.meetLink) : ''}">
    <!-- Date block -->
    <div class="flex flex-col items-center justify-center w-14 flex-shrink-0 ${isToday ? 'text-secondary' : 'text-on-surface'}">
      <span class="text-[10px] font-bold uppercase tracking-wide ${isToday ? 'text-secondary' : 'text-text-muted'}">${dt.toLocaleDateString('en-US',{weekday:'short'})}</span>
      <span class="text-2xl font-bold leading-none">${dt.getDate()}</span>
      <span class="text-[10px] text-text-muted">${dt.toLocaleDateString('en-US',{month:'short'})}</span>
    </div>
    <div class="w-px self-stretch bg-border-subtle"></div>
    <!-- Details -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-1">
        <span class="w-6 h-6 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style="background:${bg}">${escHtml(initials(child))}</span>
        <span class="font-bold text-sm text-on-surface truncate">${escHtml(child)}</span>
      </div>
      <p class="text-sm font-semibold text-on-surface truncate">${escHtml(s.subject || 'Lesson')}</p>
      <div class="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-1 text-xs text-text-muted">
        <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">schedule</span>${timeStr}${s.duration ? ` · ${s.duration} min` : ''}</span>
        ${s.teacherName ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">person</span>${escHtml(s.teacherName)}</span>` : ''}
      </div>
    </div>
    ${hasLink ? `<span class="material-symbols-outlined text-secondary flex-shrink-0" style="font-variation-settings:'FILL' 1;" title="Tap to join">video_call</span>` : ''}
  </div>`;
}

// ── Load ────────────────────────────────────────────────────────────────────
async function loadAll() {
  allSessions = [];
  const results = await Promise.all(allStudents.map(async st => {
    try {
      const snap = await getDocs(query(collection(db, 'sessions'), where('studentId', '==', st.id)));
      return snap.docs.map(d => {
        const data = d.data();
        return { id: d.id, ...data, studentId: st.id, studentName: data.studentName || st.fullName || 'Child' };
      });
    } catch (e) { console.error('loadSessions', st.id, e); return []; }
  }));
  allSessions = results.flat();
}

// ── Auth ────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/index.html'; return; }
  let parentData;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || snap.data().role !== 'parent') { await signOut(auth); window.location.href = '/index.html'; return; }
    parentData = snap.data();
  } catch (e) { window.location.href = '/index.html'; return; }

  const linkedIds = Array.isArray(parentData.linkedStudentIds) ? parentData.linkedStudentIds : [];
  if (!linkedIds.length) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('class-list').innerHTML = `
      <div class="flex flex-col items-center justify-center py-16 text-center text-text-muted gap-3">
        <span class="material-symbols-outlined text-5xl opacity-30">child_care</span>
        <p class="font-semibold text-sm">No children linked to your account yet.</p>
      </div>`;
    return;
  }

  try {
    const snaps = await Promise.all(linkedIds.map(id => getDoc(doc(db, 'students', id))));
    allStudents = snaps.filter(s => s.exists()).map(s => ({ id: s.id, ...s.data() }));
  } catch (e) {
    document.getElementById('loading-overlay').style.display = 'none';
    showToast('Failed to load student data.', 'error');
    return;
  }

  // Optional deep-link to a specific child from the dashboard
  const urlSid = new URLSearchParams(window.location.search).get('studentId') || '';
  if (allStudents.find(s => s.id === urlSid)) selectedFilter = urlSid;

  await loadAll();
  renderChips();
  renderList();
  document.getElementById('loading-overlay').style.display = 'none';
});

window.doSignOut = async function() { await signOut(auth); window.location.href = '/index.html'; };
</script>
  <script>window.CREMONA_NAV={portal:'parent',active:'schedule',title:'Schedule'};</script>
  <script src="/js/portal-nav.js"></script>
</body>
</html>
